<!-- ===== JavaScript ===== -->
<script>
// =============================================================
//  定数・設定
// =============================================================
/** localStorageのキー名 */
const STORAGE_KEY = 'unitprice_v2';
/** debounce時間(ms) */
const DEBOUNCE_MS = 300;

/**
 * 商品定義
 * 将来の商品追加はここにオブジェクトを追記するだけ
 */
const PRODUCTS = [
  { id: 'a', label: '商品 A', color: '#1a56db' },
  { id: 'b', label: '商品 B', color: '#7c3aed' },
  { id: 'c', label: '商品 C', color: '#059669' },
  { id: 'd', label: '商品 D', color: '#dc2626' },
];

// コピー用に最後の結果テキストを保持
let lastResultText = '';

// =============================================================
//  入力値の取得
//  戻り値: [{id, label, color, price, volume, unit, set}]
// =============================================================
function getInputValues() {
  return PRODUCTS.map(p => ({
    id:     p.id,
    label:  p.label,
    color:  p.color,
    price:  parseFloat(document.getElementById(`${p.id}-price`).value),
    volume: parseFloat(document.getElementById(`${p.id}-volume`).value),
    set:    parseFloat(document.getElementById(`${p.id}-set`).value) || 1,
  }));
}

// =============================================================
//  単価計算
//  @param {number} price   価格(円)
//  @param {number} volume  容量
//  @param {number} set     セット数
//  @returns {number|null}  単価 or null(計算不可)
// =============================================================
function calcUnitPrice(price, volume, set) {
  if (!isFinite(price) || !isFinite(volume) || volume <= 0 || set <= 0) return null;
  return price / (set * volume);
}

// =============================================================
//  単価の表示文字列を整形
//  例: 0.75 → "¥0.750/g"  / 12.5 → "¥12.50/g"
// =============================================================
function formatUnitPrice(unitPrice) {
  let str;
  if (unitPrice < 1)       str = unitPrice.toFixed(3);
  else if (unitPrice < 10) str = unitPrice.toFixed(2);
  else                     str = unitPrice.toFixed(1);
  str = str.replace(/\.?0+$/, '');
  return `¥${str}`;
}

// =============================================================
//  差額のパーセンテージ計算（最安値比）
// =============================================================
function calcDiffPercent(price, bestPrice) {
  if (bestPrice <= 0) return 0;
  return Math.round(((price - bestPrice) / bestPrice) * 100);
}

// =============================================================
//  XSSエスケープ（将来的に商品名を編集可能にした際の安全対策）
// =============================================================
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// =============================================================
//  結果を画面に描画（renderResults）
// =============================================================
function renderResults() {
  const container = document.getElementById('result-container');
  const copyBtn   = document.getElementById('btn-copy');
  const inputs    = getInputValues();

  // 有効な商品だけ単価計算
  const results = inputs
    .map(p => ({ ...p, unitPrice: calcUnitPrice(p.price, p.volume, p.set) }))
    .filter(p => p.unitPrice !== null);

  // --- インライン結果バッジをリセット ---
  PRODUCTS.forEach(p => {
    const badge = document.getElementById(`inline-${p.id}`);
    const row   = document.getElementById(`row-${p.id}`);
    badge.classList.remove('show','is-best');
    badge.textContent = '';
    row.classList.remove('is-best');
  });

  // 入力不足 → プレースホルダー表示
  if (results.length < 2) {
    container.innerHTML = `
      <div class="result-empty">
        <span class="icon">📦</span>
        2つ以上の商品を入力すると<br>自動で比較します
      </div>`;
    copyBtn.disabled = true;
    lastResultText = '';
    return;
  }

  // 単価の昇順ソート → ランク付け
  results.sort((a, b) => a.unitPrice - b.unitPrice);
  const bestPrice = results[0].unitPrice;

  // コピー用テキストを組み立て
  const lines = ['【単価・コスパ比較結果】'];

  const cardsHTML = results.map((p, i) => {
    const rank      = i + 1;
    const isBest    = rank === 1;
    const priceStr  = formatUnitPrice(p.unitPrice);
    const diffPct   = calcDiffPercent(p.unitPrice, bestPrice);
    const diffLabel = isBest ? '🏆 最安値' : `+${diffPct}%`;
    const diffClass = isBest ? 'best' : 'other';

    lines.push(`${rank}位 ${p.label}：${priceStr}${isBest ? '（最安値）' : `（+${diffPct}%）`}`);

    // --- インライン結果バッジを更新 ---
    const badge = document.getElementById(`inline-${p.id}`);
    const row   = document.getElementById(`row-${p.id}`);
    badge.textContent = `${rank}位　${priceStr}`;
    badge.classList.add('show');
    if (isBest) {
      badge.classList.add('is-best');
      badge.textContent = `🏆 1位　${priceStr}`;
      row.classList.add('is-best');
    }

    return `
      <div class="result-item${isBest ? ' is-best' : ''}">
        <div class="rank-badge">${rank}</div>
        <div class="result-info">
          <div class="result-name">
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${escHtml(p.color)};"></span>
            ${escHtml(p.label)}
          </div>
          <div class="result-price">${escHtml(priceStr)}</div>
        </div>
        <div class="diff-badge ${diffClass}">${diffLabel}</div>
      </div>`;
  }).join('');

  container.innerHTML = cardsHTML;
  lastResultText = lines.join('\n');
  copyBtn.disabled = false;
}

// =============================================================
//  結果をクリップボードにコピー（copyResult）
// =============================================================
function copyResult() {
  if (!lastResultText) return;
  const btn = document.getElementById('btn-copy');
  navigator.clipboard.writeText(lastResultText).then(() => {
    btn.textContent = '✅ コピーしました！';
    setTimeout(() => { btn.textContent = '📋 結果をコピー'; }, 2000);
  }).catch(() => {
    // フォールバック（古いブラウザ対応）
    const ta = document.createElement('textarea');
    ta.value = lastResultText;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✅ コピーしました！';
    setTimeout(() => { btn.textContent = '📋 結果をコピー'; }, 2000);
  });
}

// =============================================================
//  全入力リセット（resetAll）
// =============================================================
function resetAll() {
  PRODUCTS.forEach(p => {
    document.getElementById(`${p.id}-price`).value  = '';
    document.getElementById(`${p.id}-volume`).value = '';
    document.getElementById(`${p.id}-set`).value    = '1';
  });
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  renderResults();
}

// =============================================================
//  localStorageへ保存（saveToStorage）
// =============================================================
function saveToStorage() {
  try {
    const data = {};
    PRODUCTS.forEach(p => {
      data[`${p.id}-price`]  = document.getElementById(`${p.id}-price`).value;
      data[`${p.id}-volume`] = document.getElementById(`${p.id}-volume`).value;
      data[`${p.id}-set`]    = document.getElementById(`${p.id}-set`).value;
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.warn('localStorage save failed:', e);
  }
}

// =============================================================
//  localStorageから復元（restoreFromStorage）
// =============================================================
function restoreFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    PRODUCTS.forEach(p => {
      ['price','volume','set'].forEach(field => {
        const val = data[`${p.id}-${field}`];
        if (val !== undefined) document.getElementById(`${p.id}-${field}`).value = val;
      });
    });
  } catch (e) {
    console.warn('localStorage restore failed:', e);
  }
}

// =============================================================
//  debounce ユーティリティ
// =============================================================
function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

// =============================================================
//  イベントリスナー登録（initEventListeners）
// =============================================================
function initEventListeners() {
  const handleChange = debounce(() => { renderResults(); saveToStorage(); }, DEBOUNCE_MS);

  PRODUCTS.forEach(p => {
    ['price','volume','set'].forEach(field => {
      const el = document.getElementById(`${p.id}-${field}`);
      el.addEventListener('input', handleChange);
    });
  });

  // リセットボタン
  document.getElementById('reset-btn').addEventListener('click', () => {
    if (confirm('入力内容を全部クリアします。よろしいですか？')) resetAll();
  });

  // コピーボタン
  document.getElementById('btn-copy').addEventListener('click', copyResult);
}

// =============================================================
//  初期化
// =============================================================
document.addEventListener('DOMContentLoaded', () => {
  restoreFromStorage(); // 保存データ復元
  initEventListeners(); // イベント登録
  renderResults();      // 初期描画
});
</script>
</body>
</html>
