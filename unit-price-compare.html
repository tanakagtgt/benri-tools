<!-- QRコードモーダル（ツールシェア用） -->
<div class="qr-modal-overlay" id="qrModalOverlay" onclick="closeQrOnOverlay(event)">
  <div class="qr-modal">
    <div class="qr-modal-title" id="qrModalTitle">📷 QRコードでシェア</div>
    <div id="qrCanvas"></div>
    <div class="qr-modal-url" id="qrUrl"></div>
    <button class="qr-modal-close" onclick="hideQr()">✕ 閉じる</button>
  </div>
</div>

<footer>
  © 2026 単価・コスパ比較ツール<br>
  <a class="footer-back" href="https://x.com/arigaitu" target="_blank" rel="noopener">🐦 作成者X</a>
  ・
  <a class="footer-back" href="https://docs.google.com/forms/d/e/1FAIpQLSfUe9UzcRcIRFb4TmDAYKsZ75CcGRjF8Z7Ar_u7a4KgyyNyzQ/viewform?usp=publish-editor" target="_blank" rel="noopener">💡 作ってほしいツール・ご意見はこちら</a>
</footer>

<script>
/* =====================================================
   設定
   ===================================================== */
const CURRENT_TOOL_ID = 'unit-price-compare';
const STORAGE_KEY = 'unitprice_v2_inputs';
const DEBOUNCE_MS = 300;

/**
 * 商品定義：将来的に枠を増やす場合はここに追記
 * （HTML側にも同じidの product-row を追加すること）
 */
const PRODUCTS = [
  { id: 'a', label: '商品 A', color: '#1a56db' },
  { id: 'b', label: '商品 B', color: '#7c3aed' },
  { id: 'c', label: '商品 C', color: '#059669' },
  { id: 'd', label: '商品 D', color: '#dc2626' },
];

// コピー用に最後の結果を保持（テキスト／Excel共通で使う）
let lastResults = [];

/* =====================================================
   初期化
   ===================================================== */
document.addEventListener('DOMContentLoaded', () => {
  loadRecommends();
  restoreFromStorage();
  initEventListeners();
  renderResults();
});

/* =====================================================
   おすすめツール読み込み（tools.jsonから／上部・下部共通）
   ===================================================== */
async function loadRecommends() {
  try {
    const res = await fetch('/tools.json');
    const tools = await res.json();
    const others = tools.filter(t => t.id !== CURRENT_TOOL_ID);
    const picks = others.sort(() => Math.random() - 0.5).slice(0, 2);
    const html = picks.length > 0
      ? picks.map(t => `<a class="recommend-link" href="${t.url}">${t.emoji} ${t.name}</a>`).join('')
      : '';
    document.getElementById('recommendLinks').innerHTML = html;
    document.getElementById('recommendLinks2').innerHTML = html;
  } catch (e) {
    document.getElementById('recommendLinks').textContent = '';
    document.getElementById('recommendLinks2').textContent = '';
  }
}

/* =====================================================
   入力値の取得
   ===================================================== */
function getInputValues() {
  return PRODUCTS.map(p => ({
    id:     p.id,
    label:  p.label,
    color:  p.color,
    price:  parseFloat(document.getElementById(`${p.id}-price`).value),
    volume: parseFloat(document.getElementById(`${p.id}-volume`).value),
    set:    parseFloat(document.getElementById(`${p.id}-set`).value) || 1,
  }));
}

/* =====================================================
   単価計算
   ===================================================== */
function calcUnitPrice(price, volume, set) {
  if (!isFinite(price) || !isFinite(volume) || volume <= 0 || set <= 0) return null;
  return price / (set * volume);
}

/* 単価の表示文字列を整形（例: 0.75→"¥0.750" / 12.5→"¥12.50"） */
function formatUnitPrice(unitPrice) {
  let str;
  if (unitPrice < 1)       str = unitPrice.toFixed(3);
  else if (unitPrice < 10) str = unitPrice.toFixed(2);
  else                     str = unitPrice.toFixed(1);
  str = str.replace(/\.?0+$/, '');
  return `¥${str}`;
}

/* 差額パーセンテージ（最安値比） */
function calcDiffPercent(price, bestPrice) {
  if (bestPrice <= 0) return 0;
  return Math.round(((price - bestPrice) / bestPrice) * 100);
}

/* XSSエスケープ（将来的に商品名を編集可能にした際の安全対策） */
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* =====================================================
   結果を画面に描画
   ===================================================== */
function renderResults() {
  const container = document.getElementById('result-container');
  const btnText  = document.getElementById('btnCopyText');
  const btnExcel = document.getElementById('btnCopyExcel');
  const inputs   = getInputValues();

  const results = inputs
    .map(p => ({ ...p, unitPrice: calcUnitPrice(p.price, p.volume, p.set) }))
    .filter(p => p.unitPrice !== null);

  // インライン結果バッジをリセット
  PRODUCTS.forEach(p => {
    const badge = document.getElementById(`inline-${p.id}`);
    const row   = document.getElementById(`row-${p.id}`);
    badge.classList.remove('show', 'is-best');
    badge.textContent = '';
    row.classList.remove('is-best');
  });

  if (results.length < 2) {
    container.innerHTML = `
      <div class="result-empty">
        <span class="icon">📦</span>
        2つ以上の商品を入力すると<br>自動で比較します
      </div>`;
    btnText.disabled = true;
    btnExcel.disabled = true;
    lastResults = [];
    return;
  }

  results.sort((a, b) => a.unitPrice - b.unitPrice);
  const bestPrice = results[0].unitPrice;

  const cardsHTML = results.map((p, i) => {
    const rank      = i + 1;
    const isBest    = rank === 1;
    const priceStr  = formatUnitPrice(p.unitPrice);
    const diffPct   = calcDiffPercent(p.unitPrice, bestPrice);
    const diffLabel = isBest ? '🏆 最安値' : `+${diffPct}%`;
    const diffClass = isBest ? 'best' : 'other';

    // インライン結果バッジを更新
    const badge = document.getElementById(`inline-${p.id}`);
    const row   = document.getElementById(`row-${p.id}`);
    badge.textContent = `${rank}位　${priceStr}`;
    badge.classList.add('show');
    if (isBest) {
      badge.classList.add('is-best');
      badge.textContent = `🏆 1位　${priceStr}`;
      row.classList.add('is-best');
    }

    return `
      <div class="result-item${isBest ? ' is-best' : ''}">
        <div class="rank-badge">${rank}</div>
        <div class="result-info">
          <div class="result-name">
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${escHtml(p.color)};"></span>
            ${escHtml(p.label)}
          </div>
          <div class="result-price">${escHtml(priceStr)}</div>
        </div>
        <div class="diff-badge ${diffClass}">${diffLabel}</div>
      </div>`;
  }).join('');

  container.innerHTML = cardsHTML;
  lastResults = results.map((p, i) => ({
    rank: i + 1,
    label: p.label,
    priceStr: formatUnitPrice(p.unitPrice),
    isBest: i === 0,
    diffPct: calcDiffPercent(p.unitPrice, bestPrice),
  }));
  btnText.disabled = false;
  btnExcel.disabled = false;
}

/* =====================================================
   クリップボードコピー共通処理（ボタンのフィードバック付き）
   ===================================================== */
function copyToClipboard(text, btnId, label) {
  const btn = document.getElementById(btnId);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = label;
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

/* =====================================================
   結果をテキストでコピー
   ===================================================== */
function copyResultText() {
  if (lastResults.length === 0) return;
  const lines = ['【単価・コスパ比較結果】'];
  lastResults.forEach(r => {
    lines.push(`${r.rank}位 ${r.label}：${r.priceStr}${r.isBest ? '（最安値）' : `（+${r.diffPct}%）`}`);
  });
  copyToClipboard(lines.join('\n'), 'btnCopyText', '📄 テキストでコピー');
}

/* =====================================================
   結果をExcel用（タブ区切り）でコピー
   ===================================================== */
function copyResultExcel() {
  if (lastResults.length === 0) return;
  const rows = lastResults.map(r =>
    `${r.rank}位\t${r.label}\t${r.priceStr}\t${r.isBest ? '最安値' : `+${r.diffPct}%`}`
  );
  rows.unshift('順位\t商品名\t単価\t最安値との差');
  copyToClipboard(rows.join('\n'), 'btnCopyExcel', '📊 Excel用コピー');
}

/* =====================================================
   入力値リセット
   ===================================================== */
function resetAll() {
  PRODUCTS.forEach(p => {
    document.getElementById(`${p.id}-price`).value  = '';
    document.getElementById(`${p.id}-volume`).value = '';
    document.getElementById(`${p.id}-set`).value    = '1';
  });
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  renderResults();
}

/* =====================================================
   LocalStorage：保存／復元
   ===================================================== */
function saveToStorage() {
  try {
    const data = {};
    PRODUCTS.forEach(p => {
      data[`${p.id}-price`]  = document.getElementById(`${p.id}-price`).value;
      data[`${p.id}-volume`] = document.getElementById(`${p.id}-volume`).value;
      data[`${p.id}-set`]    = document.getElementById(`${p.id}-set`).value;
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    // プライベートモード等でlocalStorageが使えない場合は無視
  }
}

function restoreFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    PRODUCTS.forEach(p => {
      ['price', 'volume', 'set'].forEach(field => {
        const val = data[`${p.id}-${field}`];
        if (val !== undefined) document.getElementById(`${p.id}-${field}`).value = val;
      });
    });
  } catch (e) {
    // パース失敗時は無視
  }
}

/* =====================================================
   debounceユーティリティ
   ===================================================== */
function debounce(fn, ms) {
  let timer;
  return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); };
}

/* =====================================================
   イベントリスナー登録
   ===================================================== */
function initEventListeners() {
  const handleChange = debounce(() => { renderResults(); saveToStorage(); }, DEBOUNCE_MS);

  PRODUCTS.forEach(p => {
    ['price', 'volume', 'set'].forEach(field => {
      document.getElementById(`${p.id}-${field}`).addEventListener('input', handleChange);
    });
  });

  document.getElementById('reset-btn').addEventListener('click', () => {
    if (confirm('入力内容を全部クリアします。よろしいですか？')) resetAll();
  });
}

/* =====================================================
   シェア用URL／テキスト生成
   ===================================================== */
function buildShareUrl() {
  return location.href.split('?')[0];
}
function buildShareText() {
  return `💴 単価・コスパ比較ツール\n詰め替え・まとめ買いのコスパを瞬時に比較！どっちがお得か一発で分かります。`;
}

/* =====================================================
   URLコピー
   ===================================================== */
function shareUrl() {
  const url = buildShareUrl();
  const btn = document.getElementById('btnShareUrl');
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '🔗 URLをコピー';
      btn.classList.remove('copied');
    }, 2500);
  }).catch(() => {
    prompt('このURLをコピーしてください', url);
  });
}

/* 𝕏（Twitter）シェア */
function shareX() {
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
}

/* LINEシェア */
function shareLine() {
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(`https://line.me/R/msg/text/${encodeURIComponent(text)}`, '_blank');
}

/* =====================================================
   QRコード表示（ツールシェア用のみ／入力値付きQRは非搭載）
   ===================================================== */
function showQr() {
  const url = buildShareUrl();
  document.getElementById('qrModalTitle').textContent = '📷 QRコードでシェア';
  document.getElementById('qrModalOverlay').classList.add('show');
  document.getElementById('qrUrl').textContent = url;

  const canvas = document.getElementById('qrCanvas');
  canvas.innerHTML = '';
  new QRCode(canvas, {
    text: url,
    width: 200,
    height: 200,
    colorDark: '#111111',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}
function hideQr() {
  document.getElementById('qrModalOverlay').classList.remove('show');
}
function closeQrOnOverlay(e) {
  if (e.target === document.getElementById('qrModalOverlay')) hideQr();
}
</script>
</body>
