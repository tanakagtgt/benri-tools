<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://arigato-tools.com/qrcode-creator">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NXJCSR0EX1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-NXJCSR0EX1');
</script>

<!-- スマホズーム防止：font-size 16px以上を徹底すること -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO: titleは検索キーワードを含む25文字以内 -->
<title>QRコード作成ツール｜URL・テキストを一瞬でQR化</title>

<!-- SEO: meta description 80〜120文字 -->
<meta name="description" content="URLやテキストを入力するだけで、その場でQRコードを作成できる無料ツール。画像として保存・コピーも可能。会員登録不要でスマホから片手で使えます。">

<!-- OGP設定 -->
<meta property="og:title" content="QRコード作成ツール｜URL・テキストを一瞬でQR化">
<meta property="og:description" content="URLやテキストを入力するだけで、その場でQRコードを作成できる無料ツール。画像として保存・コピーも可能。会員登録不要でスマホから片手で使えます。">
<meta property="og:url" content="https://arigato-tools.com/qrcode-creator">
<meta property="og:type" content="website">
<meta property="og:site_name" content="便利ツール集">
<meta name="twitter:card" content="summary_large_image">

<!-- Googleフォント：CLSを最小化するためpreconnect -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">

<!-- QRコード生成ライブラリ（qrcode.js）CDN読み込み -->
<!-- サーバー不要・純JSでcanvasにQRを描画する軽量ライブラリ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
/* =====================================================
   CSS変数（色・サイズの一元管理）
   色変更はここだけ触ればOK
   ===================================================== */
:root {
  --color-primary:     #1a56db;   /* メインカラー（青） */
  --color-primary-hover: #1546b8;
  --color-primary-bg:  #e8f0fe;   /* 薄青背景 */
  --color-primary-border: #c3d4f8;
  --color-bg:          #f4f6f9;   /* ページ背景 */
  --color-card:        #fff;      /* カード背景 */
  --color-input-bg:    #f8fafd;   /* input背景 */
  --color-border:      #dde3ee;   /* 標準ボーダー */
  --color-border-input:#c7d0e0;   /* input枠 */
  --color-text:        #222;
  --color-text-sub:    #555;
  --color-text-muted:  #666;
  --color-text-label:  #aaa;
  --color-error-bg:    #fff1f1;
  --color-error-border:#fca5a5;
  --color-error-text:  #b91c1c;
  --radius-card:       10px;
  --radius-btn:        8px;
  --radius-input:      7px;
}

/* =====================================================
   ベースリセット・ボディ
   ===================================================== */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--color-bg);
  color: var(--color-text);
  font-family: 'BIZ UDPGothic', sans-serif;
  min-height: 100vh;
  padding: 24px 14px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  /* iPhoneのフォントサイズ自動調整を無効化 */
  -webkit-text-size-adjust: 100%;
}

.container { width: 100%; max-width: 600px; }

/* =====================================================
   ナビ：戻るボタン＋おすすめツール
   ===================================================== */
.back-to-index {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #f1f5fd;
  border: 1px solid var(--color-primary-border);
  border-radius: var(--radius-input);
  color: var(--color-primary);
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 7px 13px;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-back:hover { background: #dbeafe; }

.recommend-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  border-left: 2px solid var(--color-border);
  padding-left: 10px;
}
.recommend-label { font-size: 10px; color: var(--color-text-label); white-space: nowrap; }
.recommend-link {
  font-size: 11px;
  font-weight: 700;
  color: var(--color-primary);
  text-decoration: none;
  white-space: nowrap;
  background: var(--color-primary-bg);
  border-radius: 5px;
  padding: 3px 8px;
  transition: background 0.15s;
}
.recommend-link:hover { background: #dbeafe; }

/* =====================================================
   広告エリア（CLS対策：高さを固定で事前確保）
   ===================================================== */
.ad-area {
  width: 100%;
  background: var(--color-input-bg);
  border: 1px dashed var(--color-border-input);
  border-radius: var(--radius-card);
  margin-bottom: 14px;
  text-align: center;
  padding: 8px 0;
  height: 116px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.ad-area-label {
  font-size: 10px;
  color: #bbb;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

/* =====================================================
   ヘッダー
   ===================================================== */
header { text-align: center; margin-bottom: 22px; }

h1 {
  font-size: clamp(20px, 5vw, 26px);
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: 4px;
}
.subtitle {
  font-size: 11px;
  color: var(--color-text-muted);
  line-height: 1.8;
}

/* =====================================================
   カード（入力・設定エリア共通）
   ===================================================== */
.card {
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

/* =====================================================
   ラベル＋input共通
   font-size 16px以上：iPhoneの自動ズームを防ぐ
   ===================================================== */
.input-group { margin-bottom: 14px; }
.input-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text-sub);
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}

.input-group input,
.input-group select {
  width: 100%;
  border: 1px solid var(--color-border-input);
  border-radius: var(--radius-input);
  background: var(--color-input-bg);
  color: var(--color-text);
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 16px; /* ★ iPhoneズーム防止のため16px以上必須 */
  padding: 10px 10px;
  outline: none;
  transition: border-color 0.18s;
  min-height: 44px;
}
.input-group input:focus,
.input-group select:focus { border-color: var(--color-primary); }

/* 2列グリッド（横並び入力）※本ツールでは未使用だが将来の項目追加用に残置 */
.input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

/* セクションタイトル */
.section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}

/* =====================================================
   トグルボタン（2択切り替え）
   本ツールでは「エラー訂正レベル」の切り替えに使用
   ===================================================== */
.toggle-wrap { display: flex; gap: 8px; margin-bottom: 4px; }
.toggle-btn {
  flex: 1;
  padding: 10px 6px;
  border-radius: var(--radius-input);
  border: 2px solid var(--color-border-input);
  background: var(--color-input-bg);
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--color-text-sub);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  min-height: 44px;
}
.toggle-btn.active {
  border-color: var(--color-primary);
  background: var(--color-primary-bg);
  color: var(--color-primary);
}
.toggle-hint {
  font-size: 10px;
  color: var(--color-text-label);
  margin-bottom: 14px;
}

/* =====================================================
   計算（QR作成）ボタン
   ===================================================== */
.btn-calc {
  width: 100%;
  background: var(--color-primary);
  border: none;
  border-radius: var(--radius-btn);
  color: #fff;
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 16px;
  font-weight: 700;
  padding: 14px;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: background 0.15s;
  min-height: 50px;
}
.btn-calc:hover { background: var(--color-primary-hover); }

/* =====================================================
   エラーメッセージ
   ===================================================== */
.error-msg {
  display: none;
  background: var(--color-error-bg);
  border: 1px solid var(--color-error-border);
  border-radius: var(--radius-input);
  color: var(--color-error-text);
  font-size: 13px;
  padding: 9px 13px;
  margin-top: 10px;
}
.error-msg.show { display: block; }

/* =====================================================
   結果パネル
   ===================================================== */
.result-panel {
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  overflow: hidden;
}

/* メイン結果エリア：本ツールでは数字の代わりにQRコードそのものを表示 */
.result-main {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #e8f0fe 0%, #f0fdf4 100%);
  border-bottom: 1px solid var(--color-border);
  padding: 20px 16px 16px;
  text-align: center;
}
.result-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 0.1em;
  margin-bottom: 10px;
}

/* QRコード表示エリア（未生成時はプレースホルダー枠を表示） */
.qr-display-area {
  width: 188px;
  height: 188px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  border: 1px dashed var(--color-border-input);
  border-radius: var(--radius-input);
  margin: 0 auto;
}
.qr-display-area.generated {
  border-style: solid;
  border-color: var(--color-border);
}
.qr-placeholder-text {
  font-size: 11px;
  color: #bbb;
  line-height: 1.6;
  padding: 0 10px;
}

.result-sub {
  font-size: 12px;
  color: var(--color-text-muted);
  margin-top: 10px;
  min-height: 16px; /* 文字数表示の有無でガタつかないよう確保 */
}

/* =====================================================
   ③ 結果アクションボタン（テキストコピー／URL／QR保存／QR画像コピー）
   2列×2行グリッドで縦幅を節約（片手操作・1画面収まり重視）
   ===================================================== */
.copy-actions {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  padding: 16px;
}
.btn-action {
  background: #f1f5fd;
  border: 1px solid var(--color-primary-border);
  border-radius: var(--radius-input);
  color: var(--color-primary);
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 10px 6px;
  cursor: pointer;
  transition: background 0.15s;
  text-align: center;
  min-height: 44px;
}
.btn-action:hover { background: #dbeafe; }
.btn-action:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-action.copied {
  background: #d1fae5;
  border-color: #059669;
  color: #065f46;
}

/* =====================================================
   シェアエリア（結果パネル外・別カードとして配置）
   ===================================================== */
.share-area {
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: 14px 16px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.share-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}

.share-btns {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.btn-share {
  padding: 10px 4px;
  border-radius: var(--radius-input);
  border: 1px solid var(--color-border);
  background: var(--color-input-bg);
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--color-text-muted);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  min-height: 44px;
}
.btn-share:hover {
  background: var(--color-primary-bg);
  border-color: var(--color-primary);
  color: var(--color-primary);
}
.btn-share.copied {
  background: #d1fae5;
  border-color: #059669;
  color: #065f46;
}
.btn-share.x-post {
  background: #000;
  border-color: #000;
  color: #fff;
}
.btn-share.x-post:hover { background: #222; border-color: #222; color: #fff; }

.btn-share.line {
  background: #e8f8ea;
  border-color: #06c755;
  color: #06c755;
}
.btn-share.line:hover { background: #c8f0cc; }

.btn-share.qr {
  background: #f3f0ff;
  border-color: #7c3aed;
  color: #7c3aed;
}
.btn-share.qr:hover { background: #ede9fe; }

/* =====================================================
   QRコードモーダル（ツール紹介シェア用）
   ===================================================== */
.qr-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.qr-modal-overlay.show { display: flex; }
.qr-modal {
  background: #fff;
  border-radius: 14px;
  padding: 24px 20px 18px;
  text-align: center;
  max-width: 280px;
  width: 90%;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22);
  position: relative;
}
.qr-modal-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--color-text-sub);
  margin-bottom: 14px;
  letter-spacing: 0.06em;
}
#qrCanvas {
  display: flex;
  justify-content: center;
  margin-bottom: 12px;
}
.qr-modal-url {
  font-size: 10px;
  color: #aaa;
  word-break: break-all;
  margin-bottom: 14px;
}
.qr-modal-close {
  background: var(--color-primary-bg);
  border: 1px solid var(--color-primary-border);
  border-radius: var(--radius-btn);
  color: var(--color-primary);
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 10px 24px;
  cursor: pointer;
  min-height: 44px;
  transition: background 0.15s;
}
.qr-modal-close:hover { background: #dbeafe; }

/* =====================================================
   ② リセットボタン
   ===================================================== */
.btn-reset {
  width: 100%;
  background: #fff8f0;
  border: 1px solid #f5c6a0;
  border-radius: var(--radius-btn);
  color: #c05a00;
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 12px;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 14px;
  min-height: 44px;
  letter-spacing: 0.04em;
}
.btn-reset:hover { background: #ffe8d0; }

/* =====================================================
   ① 下部ナビ
   ===================================================== */
.bottom-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

/* =====================================================
   フッター
   ===================================================== */
footer {
  margin-top: 16px;
  text-align: center;
  font-size: 11px;
  color: var(--color-text-label);
}
.footer-back {
  display: inline-block;
  margin-top: 8px;
  color: var(--color-primary);
  font-size: 11px;
  text-decoration: none;
}
.footer-back:hover { text-decoration: underline; }

</style>
</head>
<body>
<div class="container">

  <!-- ナビ：ツール一覧に戻るボタン＋おすすめツール -->
  <div class="back-to-index">
    <a class="btn-back" href="/index.html">← ツール一覧に戻る</a>
    <div class="recommend-wrap">
      <span class="recommend-label">おすすめ：</span>
      <span id="recommendLinks">読み込み中…</span>
    </div>
  </div>

  <!-- ヘッダー -->
  <header>
    <h1>📷 QRコード作成ツール</h1>
    <p class="subtitle">
      ※ 入力したテキスト・URLがそのままQRコードになります<br>
      ※ 生成したQR画像は保存・コピーができます
    </p>
  </header>

  <!-- 入力カード -->
  <div class="card">

    <!-- テキスト/URL入力：本ツールの唯一の入力項目 -->
    <div class="input-group">
      <label for="inputText">テキスト / URL</label>
      <input
        type="text"
        id="inputText"
        inputmode="text"
        placeholder="例：https://arigato-tools.com"
        oninput="onInputChange()"
      >
    </div>

    <!--
      エラー訂正レベルの切り替え（テンプレのトグルUIを流用）
      標準(M)：約15%の汚れ・破損まで復元可　通常はこれでOK
      高精度(H)：約30%まで復元可　QRにロゴを重ねたい場合などに
    -->
    <div class="section-title">▶ エラー訂正レベル</div>
    <div class="toggle-wrap">
      <button class="toggle-btn active" id="toggleA" onclick="setToggle('A')">🔹 標準</button>
      <button class="toggle-btn"        id="toggleB" onclick="setToggle('B')">🔸 高精度</button>
    </div>
    <div class="toggle-hint">迷ったら「標準」でOK（ロゴ重ねる予定があれば「高精度」）</div>

    <button class="btn-calc" onclick="calculate()">📷 QRコードを作成</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- 結果パネル：QRコード表示エリア -->
  <div class="result-panel">
    <div class="result-main">
      <div class="result-label">生成されたQRコード</div>
      <div class="qr-display-area" id="qrDisplayArea">
        <span class="qr-placeholder-text">ここにQRコードが<br>表示されます</span>
      </div>
      <div class="result-sub" id="resultSub"></div>
    </div>

    <!-- =====================================================
         ③ 結果アクションボタン（4種類）
         - copyResultText()       : 入力条件＋入力テキストをコピー
         - copyResultUrlInputs()  : 入力値を引き継いだツールURLをコピー
         - downloadQrImage()      : 生成したQR画像をPNGでダウンロード
         - copyQrImageToClipboard(): 生成したQR画像をクリップボードにコピー
         ===================================================== -->
    <div class="copy-actions">
      <button class="btn-action" id="btnCopyText" onclick="copyResultText()" disabled>📄 テキストでコピー</button>
      <button class="btn-action" id="btnCopyUrlInputs" onclick="copyResultUrlInputs()" disabled>🔗 入力値URLコピー</button>
      <button class="btn-action" id="btnDownloadQr" onclick="downloadQrImage()" disabled>💾 QR画像を保存</button>
      <button class="btn-action" id="btnCopyQrImage" onclick="copyQrImageToClipboard()" disabled>🖼 QR画像をコピー</button>
    </div>
  </div>

  <!-- シェアエリア（このツール自体の紹介・常時表示） -->
  <div class="share-area">
    <div class="share-title">▶ このツールをシェア</div>
    <div class="share-btns">
      <button class="btn-share" id="btnShareUrl" onclick="shareUrl()">🔗 URLをコピー</button>
      <button class="btn-share x-post" onclick="shareX()">𝕏 ポストする</button>
      <button class="btn-share line" onclick="shareLine()">💬 LINEで送る</button>
      <button class="btn-share qr" onclick="showQr()">📷 QRコード</button>
    </div>
  </div>

  <!-- リセットボタン -->
  <button class="btn-reset" onclick="resetAll()">🔄 入力値をリセット</button>

  <!-- 下部ナビ -->
  <div class="bottom-nav">
    <a class="btn-back" href="/index.html">← ツール一覧に戻る</a>
    <div class="recommend-wrap">
      <span class="recommend-label">おすすめ：</span>
      <span id="recommendLinks2">読み込み中…</span>
    </div>
  </div>

  <!-- 広告エリア（CLS対策：height固定で事前確保） -->
  <div class="ad-area">
    <div class="ad-area-label">スポンサー</div>
    <!-- ここにAdSenseコードを貼る -->
  </div>

</div><!-- /.container -->

<!-- QRコードモーダル（ツール紹介シェア用・.containerの外） -->
<div class="qr-modal-overlay" id="qrModalOverlay" onclick="closeQrOnOverlay(event)">
  <div class="qr-modal">
    <div class="qr-modal-title" id="qrModalTitle">📷 QRコードでシェア</div>
    <div id="qrCanvas"></div>
    <div class="qr-modal-url" id="qrUrl"></div>
    <button class="qr-modal-close" onclick="hideQr()">✕ 閉じる</button>
  </div>
</div>

<!-- フッター -->
<footer>
  © 2026 QRコード作成ツール<br>
  <a class="footer-back" href="https://x.com/arigaitu" target="_blank" rel="noopener">🐦 作成者X</a>

  <a class="footer-back" href="https://docs.google.com/forms/d/e/1FAIpQLSfUe9UzcRcIRFb4TmDAYKsZ75CcGRjF8Z7Ar_u7a4KgyyNyzQ/viewform?usp=publish-editor" target="_blank" rel="noopener">💡 作ってほしいツール・ご意見はこちら</a>
</footer>

<script>
/* =====================================================
   設定
   ===================================================== */

// tools.json内のid（自分自身をおすすめから除外するため）
const CURRENT_TOOL_ID = 'qrcode-creator';

// localStorage保存キー
const STORAGE_KEY = 'qrcode-creator_inputs';

// LocalStorageに保存したいinput/selectのid一覧
const STORAGE_FIELDS = ['inputText'];

/* =====================================================
   入力項目の表示ラベル（テキストコピー等で共通利用）
   ===================================================== */
const INPUT_LABELS = {
  inputText: '入力テキスト',
};

/* =====================================================
   結果の表示ラベル
   本ツールはメイン結果（QRの中身＝入力テキスト）のみ使用
   サブ結果（bA〜bC）は不要なため定義・使用ともに削除済み
   ===================================================== */
const RESULT_LABELS = {
  main: 'QRコード内容',
};

/* =====================================================
   状態管理
   ===================================================== */
let currentToggle = 'A'; // エラー訂正レベル：A=標準(M) / B=高精度(H)

/* =====================================================
   初期化
   ===================================================== */
document.addEventListener('DOMContentLoaded', () => {
  loadRecommends();
  restoreInputs();
});

/* =====================================================
   おすすめツール読み込み（tools.jsonから）
   ===================================================== */
async function loadRecommends() {
  try {
    const res = await fetch('/tools.json');
    const tools = await res.json();

    const others = tools.filter(t => t.id !== CURRENT_TOOL_ID);
    const picks = others.sort(() => Math.random() - 0.5).slice(0, 2);

    const html = picks.length > 0
      ? picks.map(t => `<a class="recommend-link" href="${t.url}">${t.emoji} ${t.name}</a>`).join('')
      : '';

    document.getElementById('recommendLinks').innerHTML = html;
    document.getElementById('recommendLinks2').innerHTML = html;

  } catch (e) {
    document.getElementById('recommendLinks').textContent = '';
    document.getElementById('recommendLinks2').textContent = '';
  }
}

/* =====================================================
   トグル切り替え（エラー訂正レベル）
   ===================================================== */
function setToggle(val) {
  currentToggle = val;
  document.getElementById('toggleA').classList.toggle('active', val === 'A');
  document.getElementById('toggleB').classList.toggle('active', val === 'B');
  onInputChange();
}

/* =====================================================
   入力変更時のハンドラ（保存→計算を一括で呼ぶ）
   ===================================================== */
function onInputChange() {
  saveInputs();
  calculate();
}

/* =====================================================
   【入力取得】
   ===================================================== */
function calculateInputs() {
  return {
    text: document.getElementById('inputText').value,
    toggle: currentToggle,
  };
}

/* =====================================================
   【計算（QR化の可否判定）】
   - 空文字なら null を返し、結果パネルはプレースホルダーに戻す
   - QRコードそのものの生成は displayResult() 側で行う
   ===================================================== */
function calculateResult(inputs) {
  const text = inputs.text.trim();
  if (!text) return null;

  return { main: text };
}

/* =====================================================
   【表示】
   - QRコード描画＋文字数表示＋アクションボタン有効化
   ===================================================== */
function displayResult(result) {
  generateQrDisplay(result.main);

  document.getElementById('resultSub').textContent = `文字数：${result.main.length}文字`;

  ['btnCopyText', 'btnCopyUrlInputs', 'btnDownloadQr', 'btnCopyQrImage'].forEach(id => {
    document.getElementById(id).disabled = false;
  });
}

/* =====================================================
   QRコードを表示エリアに描画する
   - qrcode.js が内部で <canvas> を生成する
   - エラー訂正レベルはトグルの状態（currentToggle）で切り替え
   ===================================================== */
function generateQrDisplay(text) {
  const area = document.getElementById('qrDisplayArea');
  area.innerHTML = '';

  new QRCode(area, {
    text: text,
    width: 180,
    height: 180,
    colorDark: '#111111',
    colorLight: '#ffffff',
    correctLevel: currentToggle === 'B' ? QRCode.CorrectLevel.H : QRCode.CorrectLevel.M
  });

  area.classList.add('generated');
}

/* =====================================================
   計算メイン処理（入力取得→計算→表示）
   ===================================================== */
function calculate() {
  const inputs = calculateInputs();
  const result = calculateResult(inputs);

  const errEl = document.getElementById('errorMsg');

  if (result === null) {
    errEl.classList.remove('show');
    reset();
    return;
  }

  errEl.classList.remove('show');
  displayResult(result);
}

/* =====================================================
   リセット（プレースホルダー表示に戻す）
   ===================================================== */
function reset() {
  const area = document.getElementById('qrDisplayArea');
  area.innerHTML = '<span class="qr-placeholder-text">ここにQRコードが<br>表示されます</span>';
  area.classList.remove('generated');

  document.getElementById('resultSub').textContent = '';

  ['btnCopyText', 'btnCopyUrlInputs', 'btnDownloadQr', 'btnCopyQrImage'].forEach(id => {
    document.getElementById(id).disabled = true;
  });
}

/* =====================================================
   1つのinput/selectから表示用の値を取得する
   ===================================================== */
function getInputDisplayValue(id) {
  const el = document.getElementById(id);
  if (!el) return '';
  if (el.type === 'checkbox') return el.checked ? 'ON' : 'OFF';
  if (el.tagName === 'SELECT') return el.options[el.selectedIndex]?.text ?? el.value;
  return el.value;
}

/* =====================================================
   入力条件を「ラベル：値」の配列で取得
   - トグル（エラー訂正レベル）も末尾に自動追加
   ===================================================== */
function buildConditionsLines() {
  const lines = Object.keys(INPUT_LABELS).map(
    id => `${INPUT_LABELS[id]}：${getInputDisplayValue(id)}`
  );
  const toggleAEl = document.getElementById('toggleA');
  if (toggleAEl) {
    const activeBtn = document.getElementById(currentToggle === 'A' ? 'toggleA' : 'toggleB');
    lines.push(`エラー訂正レベル：${activeBtn.textContent.trim()}`);
  }
  return lines;
}

/* =====================================================
   クリップボードコピー共通処理（ボタンのフィードバック付き）
   ===================================================== */
function copyToClipboard(text, btnId, label) {
  const btn = document.getElementById(btnId);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = label;
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

/* =====================================================
   ①入力テキストをコピー（入力条件＋QRの中身をテキストで）
   ===================================================== */
function copyResultText() {
  const inputs = calculateInputs();
  const result = calculateResult(inputs);
  if (!result) return;

  const lines = [
    '【入力条件】',
    ...buildConditionsLines(),
    '',
    '【QRコード内容】',
    `${RESULT_LABELS.main}：${result.main}`,
  ];

  copyToClipboard(lines.join('\n'), 'btnCopyText', '📄 テキストでコピー');
}

/* =====================================================
   ②入力値URLコピー
   - 現在の入力テキストをURLパラメータに乗せてコピー
   - このURLを開けば同じテキストが入力済みの状態で開始できる
   ===================================================== */
function buildShareUrlWithInputs() {
  const params = new URLSearchParams();
  STORAGE_FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    params.set(id, el.type === 'checkbox' ? (el.checked ? '1' : '0') : el.value);
  });
  return location.href.split('?')[0] + '?' + params.toString();
}

function copyResultUrlInputs() {
  const inputs = calculateInputs();
  const result = calculateResult(inputs);
  if (!result) return;

  copyToClipboard(buildShareUrlWithInputs(), 'btnCopyUrlInputs', '🔗 入力値URLコピー');
}

/* =====================================================
   ③QR画像を保存（PNGダウンロード）
   - qrDisplayArea内のcanvasをそのままPNG化してダウンロード
   ===================================================== */
function downloadQrImage() {
  const canvas = document.querySelector('#qrDisplayArea canvas');
  const btn = document.getElementById('btnDownloadQr');
  if (!canvas) return;

  const link = document.createElement('a');
  link.download = 'qrcode.png';
  link.href = canvas.toDataURL('image/png');
  link.click();

  btn.textContent = '✅ 保存しました！';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = '💾 QR画像を保存';
    btn.classList.remove('copied');
  }, 2000);
}

/* =====================================================
   ④QR画像をクリップボードにコピー
   - Clipboard API（画像対応ブラウザ）のみ対応
   - 非対応ブラウザでは「非対応」表示にフォールバック
   ===================================================== */
function copyQrImageToClipboard() {
  const canvas = document.querySelector('#qrDisplayArea canvas');
  const btn = document.getElementById('btnCopyQrImage');
  if (!canvas) return;

  canvas.toBlob(blob => {
    if (!blob) return;

    if (navigator.clipboard && window.ClipboardItem) {
      navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(() => {
        btn.textContent = '✅ コピーしました！';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '🖼 QR画像をコピー';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        btn.textContent = '⚠️ 非対応です';
        setTimeout(() => { btn.textContent = '🖼 QR画像をコピー'; }, 2000);
      });
    } else {
      btn.textContent = '⚠️ 非対応です';
      setTimeout(() => { btn.textContent = '🖼 QR画像をコピー'; }, 2000);
    }
  });
}

/* =====================================================
   LocalStorage：入力値を保存
   ===================================================== */
function saveInputs() {
  try {
    const data = {};
    STORAGE_FIELDS.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      data[id] = el.type === 'checkbox' ? el.checked : el.value;
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    // プライベートモード等でlocalStorageが使えない場合は無視
  }
}

/* =====================================================
   LocalStorage：入力値を復元
   ===================================================== */
function restoreInputs() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;

    const data = JSON.parse(raw);
    STORAGE_FIELDS.forEach(id => {
      if (!(id in data)) return;
      const el = document.getElementById(id);
      if (!el) return;
      if (el.type === 'checkbox') {
        el.checked = data[id];
      } else {
        el.value = data[id];
      }
    });

    calculate();
  } catch (e) {
    // パース失敗時は無視
  }
}

/* =====================================================
   ②入力値リセット
   ===================================================== */
function resetAll() {
  STORAGE_FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.type === 'checkbox') {
      el.checked = false;
    } else {
      el.value = '';
    }
  });

  if (document.getElementById('toggleA')) setToggle('A');

  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}

  document.getElementById('errorMsg').classList.remove('show');
  reset();
}

/* =====================================================
   エラー表示ヘルパー（バリデーション強化時に使う）
   ===================================================== */
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

/* =====================================================
   【シェア用URL生成】
   - ツール紹介シェアは常にツールのトップURL（入力値なし）
   - 入力値付きで共有したい場合は copyResultUrlInputs() を使う
   ===================================================== */
function buildShareUrl() {
  return location.href.split('?')[0];
}

/* =====================================================
   【シェア用テキスト生成】
   ===================================================== */
function buildShareText(result) {
  return `📷 QRコード作成ツール\nURLやテキストを入力するだけで、その場でQRコードに変換できます！`;
}

/* =====================================================
   URLコピー
   ===================================================== */
function shareUrl() {
  const url = buildShareUrl();
  const btn = document.getElementById('btnShareUrl');

  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '🔗 URLをコピー';
      btn.classList.remove('copied');
    }, 2500);
  }).catch(() => {
    prompt('このURLをコピーしてください', url);
  });
}

/* =====================================================
   𝕏（Twitter）シェア
   ===================================================== */
function shareX() {
  const text = buildShareText(null) + '\n' + buildShareUrl();
  window.open(
    `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,
    '_blank'
  );
}

/* =====================================================
   LINEシェア
   ===================================================== */
function shareLine() {
  const text = buildShareText(null) + '\n' + buildShareUrl();
  window.open(
    `https://line.me/R/msg/text/${encodeURIComponent(text)}`,
    '_blank'
  );
}

/* =====================================================
   QRコード表示（ツール紹介シェア用モーダル）
   ===================================================== */
function showQr(customUrl, customTitle) {
  const url = customUrl || buildShareUrl();

  document.getElementById('qrModalTitle').textContent = customTitle || '📷 QRコードでシェア';
  document.getElementById('qrModalOverlay').classList.add('show');
  document.getElementById('qrUrl').textContent = url;

  const canvas = document.getElementById('qrCanvas');
  canvas.innerHTML = '';

  new QRCode(canvas, {
    text: url,
    width: 200,
    height: 200,
    colorDark:  '#111111',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

/* =====================================================
   QRモーダルを閉じる
   ===================================================== */
function hideQr() {
  document.getElementById('qrModalOverlay').classList.remove('show');
}

/* =====================================================
   オーバーレイタップで閉じる
   ===================================================== */
function closeQrOnOverlay(e) {
  if (e.target === document.getElementById('qrModalOverlay')) hideQr();
}
</script>
