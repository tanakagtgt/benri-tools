<html lang="ja">
<head>
<meta charset="UTF-8">
<link rel="canonical" href="https://arigato-tools.com/rent-simulator.html">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>賃貸総額シミュレーター｜一生で払う家賃と賃貸コストを計算</title>
<meta name="description" content="家賃・管理費・駐車場代・更新料などから、一生で払う家賃や賃貸コスト総額を自動計算。賃貸と持ち家の比較検討にも役立ちます。">

<!-- OGP設定 -->
<meta property="og:title" content="賃貸総額シミュレーター｜一生で払う家賃と賃貸コストを計算">
<meta property="og:description" content="家賃・管理費・駐車場代・更新料などから、一生で払う家賃や賃貸コスト総額を自動計算。賃貸と持ち家の比較検討にも役立ちます。">
<meta property="og:image" content="https://arigato-tools.com/ogp/rent-simulator.png">
<meta property="og:url" content="https://arigato-tools.com/rent-simulator.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="ありがとうツール">
<meta name="twitter:card" content="summary_large_image">

<!-- 構造化データ -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "賃貸総額シミュレーター",
  "description": "家賃・管理費・駐車場代・更新料などから、一生で払う家賃や賃貸コスト総額を自動計算。",
  "applicationCategory": "FinanceApplication",
  "operatingSystem": "All",
  "offers": { "@type": "Offer", "price": "0", "priceCurrency": "JPY" }
}
</script>

<!-- Googleフォント：CLSを最小化するためpreconnect -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">

<style>
/* =====================================================
   CSS変数（色・サイズの一元管理）
   色変更はここだけ触ればOK
   ===================================================== */
:root {
  --color-primary:        #1a56db;
  --color-primary-hover:  #1546b8;
  --color-primary-bg:     #e8f0fe;
  --color-primary-border: #c3d4f8;
  --color-bg:             #f4f6f9;
  --color-card:           #fff;
  --color-input-bg:       #f8fafd;
  --color-border:         #dde3ee;
  --color-border-input:   #c7d0e0;
  --color-text:           #222;
  --color-text-sub:       #555;
  --color-text-muted:     #666;
  --color-text-label:     #aaa;
  --color-error-bg:       #fff1f1;
  --color-error-border:   #fca5a5;
  --color-error-text:     #b91c1c;
  --radius-card:          10px;
  --radius-btn:           8px;
  --radius-input:         7px;
  --font-main:            'BIZ UDPGothic', sans-serif;
  --shadow-card:          0 1px 4px rgba(0,0,0,0.06);
}

/* =====================================================
   ベースリセット・ボディ
   ===================================================== */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-main);
  min-height: 100vh;
  padding: 24px 14px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  /* iPhoneのフォントサイズ自動調整を無効化 */
  -webkit-text-size-adjust: 100%;
}

.container { width: 100%; max-width: 600px; }

/* =====================================================
   ナビ：戻るボタン＋おすすめツール
   ===================================================== */
.back-to-index {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #f1f5fd;
  border: 1px solid var(--color-primary-border);
  border-radius: var(--radius-input);
  color: var(--color-primary);
  font-family: var(--font-main);
  font-size: 12px;
  font-weight: 700;
  padding: 7px 13px;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-back:hover { background: #dbeafe; }

.recommend-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  border-left: 2px solid var(--color-border);
  padding-left: 10px;
}
.recommend-label { font-size: 10px; color: var(--color-text-label); white-space: nowrap; }
.recommend-link {
  font-size: 11px;
  font-weight: 700;
  color: var(--color-primary);
  text-decoration: none;
  white-space: nowrap;
  background: var(--color-primary-bg);
  border-radius: 5px;
  padding: 3px 8px;
  transition: background 0.15s;
}
.recommend-link:hover { background: #dbeafe; }

/* =====================================================
   広告エリア（CLS対策：高さを固定で事前確保）
   ===================================================== */
.ad-area {
  width: 100%;
  background: var(--color-input-bg);
  border: 1px dashed var(--color-border-input);
  border-radius: var(--radius-card);
  margin-bottom: 14px;
  text-align: center;
  padding: 8px 0;
  height: 116px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.ad-area-label {
  font-size: 10px;
  color: #bbb;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

/* =====================================================
   ヘッダー
   ===================================================== */
header { text-align: center; margin-bottom: 22px; }

h1 {
  font-size: clamp(20px, 5vw, 26px);
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: 4px;
}
.subtitle {
  font-size: 11px;
  color: var(--color-text-muted);
  line-height: 1.8;
}

/* =====================================================
   カード（入力・設定エリア共通）
   ===================================================== */
.card {
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-card);
}

/* =====================================================
   ラベル＋input共通
   font-size 16px以上：iPhoneの自動ズームを防ぐ
   ===================================================== */
.input-group { margin-bottom: 14px; }
.input-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text-sub);
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}

/* ★ font-size: 16px 以上必須（16px未満だとiPhoneがズームする） */
.input-group input {
  width: 100%;
  border: 1px solid var(--color-border-input);
  border-radius: var(--radius-input);
  background: var(--color-input-bg);
  color: var(--color-text);
  font-family: var(--font-main);
  font-size: 16px;
  padding: 10px;
  outline: none;
  transition: border-color 0.18s;
  min-height: 44px; /* タッチターゲット確保 */
  -webkit-appearance: none;
  appearance: none;
}
.input-group input:focus { border-color: var(--color-primary); }

/* 2列グリッド */
.input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

/* セクションタイトル */
.section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}

/* =====================================================
   詳細設定トグル（アコーディオン）
   ===================================================== */
.detail-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 700;
  color: var(--color-primary);
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font-main);
  padding: 4px 0;
  margin-bottom: 0;
  user-select: none;
  width: 100%;
  text-align: left;
  min-height: 44px; /* タッチターゲット確保 */
}

.detail-toggle .arrow {
  display: inline-block;
  transition: transform 0.2s;
  font-style: normal;
}
.detail-toggle.open .arrow { transform: rotate(90deg); }

/* 詳細設定エリア（高さアニメーション） */
.detail-section {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease;
}
.detail-section.open { max-height: 900px; }

.detail-inner { padding-top: 14px; }

/* =====================================================
   計算ボタン
   ===================================================== */
.btn-calc {
  width: 100%;
  background: var(--color-primary);
  border: none;
  border-radius: var(--radius-btn);
  color: #fff;
  font-family: var(--font-main);
  font-size: 16px;
  font-weight: 700;
  padding: 14px;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: background 0.15s;
  margin-top: 6px;
  min-height: 50px;
  -webkit-appearance: none;
  appearance: none;
}
.btn-calc:hover  { background: var(--color-primary-hover); }
.btn-calc:active { opacity: 0.88; }

/* =====================================================
   エラーメッセージ
   ===================================================== */
.error-msg {
  display: none;
  background: var(--color-error-bg);
  border: 1px solid var(--color-error-border);
  border-radius: var(--radius-input);
  color: var(--color-error-text);
  font-size: 13px;
  padding: 9px 13px;
  margin-top: 10px;
}
.error-msg.show { display: block; }

/* =====================================================
   結果パネル
   ===================================================== */
.result-panel {
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  margin-bottom: 14px;
  box-shadow: var(--shadow-card);
  overflow: hidden;
}

/* メイン結果（大きい数字エリア） */
.result-main {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #e8f0fe 0%, #f0fdf4 100%);
  border-bottom: 1px solid var(--color-border);
  padding: 20px 16px 16px;
  text-align: center;
}
.result-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.result-number {
  font-size: clamp(40px, 12vw, 64px);
  font-weight: 700;
  color: var(--color-text);
  line-height: 1;
}
.result-number.placeholder { color: #bbb; }
.result-unit {
  font-size: 16px;
  color: var(--color-text-sub);
  font-weight: 700;
  margin-left: 4px;
}
.result-sub {
  font-size: 12px;
  color: var(--color-text-muted);
  margin-top: 6px;
}

/* 内訳エリア */
.breakdown-wrap { padding: 16px; }

/* 1行目：3列 */
.breakdown {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}

/* 2行目：2列 */
.breakdown-row2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.breakdown-item {
  background: var(--color-input-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-btn);
  padding: 11px 6px;
  text-align: center;
}
.b-num {
  font-size: 15px;
  font-weight: 700;
  color: var(--color-text);
  word-break: break-all;
}
.b-num.placeholder { color: #ccc; }
.b-label {
  font-size: 10px;
  color: var(--color-text-muted);
  margin-top: 3px;
  line-height: 1.4;
}

/* =====================================================
   コピーボタン
   ===================================================== */
.btn-copy {
  width: 100%;
  background: #f1f5fd;
  border: 1px solid var(--color-primary-border);
  border-radius: var(--radius-input);
  color: var(--color-primary);
  font-family: var(--font-main);
  font-size: 14px;
  font-weight: 700;
  padding: 11px;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 0;
  min-height: 44px;
  -webkit-appearance: none;
  appearance: none;
}
.btn-copy:hover    { background: #dbeafe; }
.btn-copy:disabled { opacity: 0.4; cursor: not-allowed; }

/* =====================================================
   シェアエリア（常時表示）
   ===================================================== */
.share-area {
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: 14px 16px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-card);
}
.share-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}

/* シェアボタン：3列グリッド */
.share-btns {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.btn-share {
  padding: 10px 6px;
  border-radius: var(--radius-input);
  border: 1px solid var(--color-border);
  background: var(--color-input-bg);
  font-family: var(--font-main);
  font-size: 13px;
  font-weight: 700;
  color: var(--color-text-muted);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  min-height: 44px;
  -webkit-appearance: none;
  appearance: none;
}
.btn-share:hover {
  background: var(--color-primary-bg);
  border-color: var(--color-primary);
  color: var(--color-primary);
}
/* URLコピー完了フィードバック */
.btn-share.copied {
  background: #d1fae5;
  border-color: #059669;
  color: #065f46;
}
/* LINEボタン専用色（公式グリーン） */
.btn-share.line {
  background: #e8f8ea;
  border-color: #06c755;
  color: #06c755;
}
.btn-share.line:hover { background: #c8f0cc; }

/* =====================================================
   フッター
   ===================================================== */
footer {
  margin-top: 30px;
  text-align: center;
  font-size: 11px;
  color: var(--color-text-label);
}
.footer-back {
  display: inline-block;
  margin-top: 8px;
  color: var(--color-primary);
  font-size: 11px;
  text-decoration: none;
}
.footer-back:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">

  <!-- ナビ：ツール一覧に戻るボタン＋おすすめツール -->
  <div class="back-to-index">
    <a class="btn-back" href="/index.html">← ツール一覧に戻る</a>
    <div class="recommend-wrap">
      <span class="recommend-label">おすすめ：</span>
      <span id="recommendLinks">読み込み中…</span>
    </div>
  </div>

  <!-- 広告エリア（上） -->
  <div class="ad-area">
    <div class="ad-area-label">スポンサー</div>
    <!-- ここにAdSenseコードを貼る -->
  </div>

  <!-- ヘッダー -->
  <header>
    <h1>🏠 賃貸総額シミュレーター</h1>
    <p class="subtitle">
      ※ 月額費用と居住年数を入力するだけで、一生分の賃貸コストを自動計算<br>
      ※ 賃貸と持ち家の比較検討にもご活用ください
    </p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <div class="section-title">▶ 基本情報</div>

    <!-- 月額費用（2列） -->
    <div class="input-grid">
      <div class="input-group">
        <label for="rent">月額家賃（円）</label>
        <input
          type="number" id="rent"
          inputmode="decimal" placeholder="例：70000" min="0"
          oninput="onInputChange()"
        >
      </div>
      <div class="input-group">
        <label for="kanri">共益費・管理費（円）</label>
        <input
          type="number" id="kanri"
          inputmode="decimal" placeholder="例：5000" min="0"
          oninput="onInputChange()"
        >
      </div>
    </div>

    <div class="input-grid">
      <div class="input-group">
        <label for="parking">駐車場代（円）</label>
        <input
          type="number" id="parking"
          inputmode="decimal" placeholder="例：0" min="0"
          oninput="onInputChange()"
        >
      </div>
      <div class="input-group">
        <label for="years">想定居住年数（年）</label>
        <input
          type="number" id="years"
          inputmode="decimal" placeholder="例：10" min="0"
          oninput="onInputChange()"
        >
      </div>
    </div>

    <!-- 詳細設定アコーディオン -->
    <button class="detail-toggle" id="detailToggleBtn" onclick="toggleDetail()" type="button">
      <span class="arrow">▶</span> 詳細設定（更新料・火災保険・保証会社）
    </button>

    <div class="detail-section" id="detailSection">
      <div class="detail-inner">

        <!-- 更新料 -->
        <div class="section-title">▶ 更新料</div>
        <div class="input-grid">
          <div class="input-group">
            <label for="renewal">更新料（円）</label>
            <input
              type="number" id="renewal"
              inputmode="decimal" placeholder="例：55000" min="0"
              oninput="onInputChange()"
            >
          </div>
          <div class="input-group">
            <label for="renewalY">更新年数（年）</label>
            <input
              type="number" id="renewalY"
              inputmode="decimal" placeholder="例：2" min="0"
              oninput="onInputChange()"
            >
          </div>
        </div>

        <!-- 火災保険 -->
        <div class="section-title">▶ 火災保険</div>
        <div class="input-grid">
          <div class="input-group">
            <label for="fire">火災保険料（円）</label>
            <input
              type="number" id="fire"
              inputmode="decimal" placeholder="例：20000" min="0"
              oninput="onInputChange()"
            >
          </div>
          <div class="input-group">
            <label for="fireY">更新年数（年）</label>
            <input
              type="number" id="fireY"
              inputmode="decimal" placeholder="例：2" min="0"
              oninput="onInputChange()"
            >
          </div>
        </div>

        <!-- 保証会社 -->
        <div class="section-title">▶ 保証会社</div>
        <div class="input-grid">
          <div class="input-group">
            <label for="hosho">保証会社更新料（円）</label>
            <input
              type="number" id="hosho"
              inputmode="decimal" placeholder="例：10000" min="0"
              oninput="onInputChange()"
            >
          </div>
          <div class="input-group">
            <label for="hoshoY">更新年数（年）</label>
            <input
              type="number" id="hoshoY"
              inputmode="decimal" placeholder="例：1" min="0"
              oninput="onInputChange()"
            >
          </div>
        </div>

      </div><!-- /detail-inner -->
    </div><!-- /detail-section -->

    <button class="btn-calc" onclick="calculate()" type="button">計算する</button>
    <div class="error-msg" id="errorMsg"></div>
  </div><!-- /card -->

  <!-- 結果パネル -->
  <div class="result-panel">
    <div class="result-main">
      <div class="result-label">賃貸コスト総額</div>
      <div>
        <span class="result-number placeholder" id="resultTotal">—</span>
        <span class="result-unit">円</span>
      </div>
      <div class="result-sub" id="resultSub"></div>
    </div>

    <div class="breakdown-wrap">

      <!-- 内訳1行目：3列 -->
      <div class="breakdown">
        <div class="breakdown-item">
          <div class="b-num placeholder" id="bAnnual">—</div>
          <div class="b-label">年間住居費</div>
        </div>
        <div class="breakdown-item">
          <div class="b-num placeholder" id="bRentTotal">—</div>
          <div class="b-label">家賃総額</div>
        </div>
        <div class="breakdown-item">
          <div class="b-num placeholder" id="bRenewalTotal">—</div>
          <div class="b-label">更新料総額</div>
        </div>
      </div>

      <!-- 内訳2行目：2列 -->
      <div class="breakdown-row2">
        <div class="breakdown-item">
          <div class="b-num placeholder" id="bFireTotal">—</div>
          <div class="b-label">火災保険総額</div>
        </div>
        <div class="breakdown-item">
          <div class="b-num placeholder" id="bHoshoTotal">—</div>
          <div class="b-label">保証会社費用総額</div>
        </div>
      </div>

      <button class="btn-copy" id="btnCopy" onclick="copyResult()" disabled type="button">
        📋 結果をコピー
      </button>

    </div><!-- /breakdown-wrap -->
  </div><!-- /result-panel -->

  <!-- シェアエリア（常時表示） -->
  <div class="share-area">
    <div class="share-title">▶ このツールをシェア</div>
    <div class="share-btns">
      <button class="btn-share" id="btnShareUrl" onclick="shareUrl()" type="button">🔗 URLをコピー</button>
      <button class="btn-share" onclick="shareX()" type="button">𝕏 ポストする</button>
      <button class="btn-share line" onclick="shareLine()" type="button">💬 LINEで送る</button>
    </div>
  </div>

  <!-- 広告エリア（下） -->
  <div class="ad-area">
    <div class="ad-area-label">スポンサー</div>
    <!-- ここにAdSenseコードを貼る -->
  </div>

</div><!-- /container -->

<script>
/* =====================================================
   設定
   ===================================================== */

// tools.json内のid（おすすめから自分自身を除外するため）
const CURRENT_TOOL_ID = 'rent-simulator';

// localStorage保存キー
const STORAGE_KEY = 'rent-simulator_v1';

// 保存対象のinput id一覧
const STORAGE_FIELDS = ['rent', 'kanri', 'parking', 'years', 'renewal', 'renewalY', 'fire', 'fireY', 'hosho', 'hoshoY'];

/* =====================================================
   初期化
   ===================================================== */
document.addEventListener('DOMContentLoaded', () => {
  loadRecommends(); // おすすめツールを非同期で読み込む
  restoreInputs();  // localStorageから入力値を復元して即計算
});

/* =====================================================
   おすすめツール読み込み（tools.jsonから）
   ===================================================== */
async function loadRecommends() {
  try {
    const res   = await fetch('/tools.json');
    const tools = await res.json();

    // 自分以外をシャッフルして2件表示
    const others = tools.filter(t => t.id !== CURRENT_TOOL_ID);
    const picks  = others.sort(() => Math.random() - 0.5).slice(0, 2);
    const wrap   = document.getElementById('recommendLinks');

    if (picks.length === 0) { wrap.textContent = ''; return; }
    wrap.innerHTML = picks.map(t =>
      `<a class="recommend-link" href="${t.url}">${t.emoji} ${t.name}</a>`
    ).join('');
  } catch (e) {
    // 読み込み失敗時はエリアを空にする（エラー表示しない）
    document.getElementById('recommendLinks').textContent = '';
  }
}

/* =====================================================
   詳細設定トグル（アコーディオン開閉）
   ===================================================== */
function toggleDetail() {
  const btn     = document.getElementById('detailToggleBtn');
  const section = document.getElementById('detailSection');
  btn.classList.toggle('open');
  section.classList.toggle('open');
}

/* =====================================================
   入力値取得
   未入力・不正値は 0 を返す（必須チェックはvalidate()で別途実施）
   ===================================================== */
function getVal(id) {
  const v = parseFloat(document.getElementById(id).value);
  return isNaN(v) || v < 0 ? 0 : v;
}

/* =====================================================
   【計算ロジック】
   各費用を計算して結果オブジェクトを返す
   ===================================================== */
function calcRentCost() {
  // ── 入力値を取得 ──────────────────────────
  const rent    = getVal('rent');     // 月額家賃
  const kanri   = getVal('kanri');    // 共益費・管理費
  const parking = getVal('parking'); // 駐車場代
  const years   = getVal('years');   // 居住年数

  const renewal  = getVal('renewal');  // 更新料（1回あたり）
  const renewalY = getVal('renewalY'); // 更新年数
  const fire     = getVal('fire');     // 火災保険料（1回あたり）
  const fireY    = getVal('fireY');    // 火災保険更新年数
  const hosho    = getVal('hosho');    // 保証会社更新料（1回あたり）
  const hoshoY   = getVal('hoshoY');   // 保証会社更新年数

  // ── 計算 ───────────────────────────────────
  // 年間住居費（家賃＋管理費＋駐車場） × 12ヶ月
  const annual = (rent + kanri + parking) * 12;

  // 家賃総額（年間住居費 × 居住年数）
  const rentTotal = annual * years;

  // 更新料総額（更新年数が0なら0回）
  const renewalCount = renewalY > 0 ? Math.floor(years / renewalY) : 0;
  const renewalTotal = renewal * renewalCount;

  // 火災保険総額（更新年数が0なら0回）
  const fireCount = fireY > 0 ? Math.floor(years / fireY) : 0;
  const fireTotal = fire * fireCount;

  // 保証会社費用総額（更新年数が0なら0回）
  const hoshoCount = hoshoY > 0 ? Math.floor(years / hoshoY) : 0;
  const hoshoTotal = hosho * hoshoCount;

  // 賃貸コスト総額
  const grandTotal = rentTotal + renewalTotal + fireTotal + hoshoTotal;

  return {
    // 入力値（コピーテキスト・シェアで使用）
    inputs: { rent, kanri, parking, years, renewal, renewalY, fire, fireY, hosho, hoshoY },
    // 計算結果
    annual, rentTotal, renewalTotal, fireTotal, hoshoTotal,
    renewalCount, fireCount, hoshoCount,
    grandTotal, years,
  };
}

/* =====================================================
   金額フォーマット（3桁区切り＋円）
   ===================================================== */
function formatYen(num) {
  return num.toLocaleString('ja-JP') + '円';
}

/* =====================================================
   【結果表示】
   計算結果を各DOM要素にセット
   ===================================================== */
function displayResult(r) {
  // メイン結果
  const totalEl = document.getElementById('resultTotal');
  totalEl.textContent = formatYen(r.grandTotal);
  totalEl.classList.remove('placeholder');

  // サブテキスト
  document.getElementById('resultSub').textContent =
    r.years > 0 ? `${r.years}年間の賃貸コスト合計` : '';

  // 内訳
  setBreakdown('bAnnual',      formatYen(r.annual));
  setBreakdown('bRentTotal',   formatYen(r.rentTotal));
  setBreakdown('bRenewalTotal',formatYen(r.renewalTotal));
  setBreakdown('bFireTotal',   formatYen(r.fireTotal));
  setBreakdown('bHoshoTotal',  formatYen(r.hoshoTotal));

  // コピーボタン有効化
  document.getElementById('btnCopy').disabled = false;
}

/* 内訳1アイテムをセットするヘルパー */
function setBreakdown(id, text) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.classList.remove('placeholder');
}

/* =====================================================
   結果リセット（プレースホルダー表示に戻す）
   ===================================================== */
function resetResult() {
  const totalEl = document.getElementById('resultTotal');
  totalEl.textContent = '—';
  totalEl.classList.add('placeholder');
  document.getElementById('resultSub').textContent = '';

  ['bAnnual','bRentTotal','bRenewalTotal','bFireTotal','bHoshoTotal'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = '—';
    el.classList.add('placeholder');
  });

  document.getElementById('btnCopy').disabled = true;
}

/* =====================================================
   バリデーション
   必須項目（家賃・居住年数）のチェック
   ===================================================== */
function validate() {
  const rent  = document.getElementById('rent').value.trim();
  const years = document.getElementById('years').value.trim();

  if (rent === '' || years === '') {
    showError('月額家賃と想定居住年数を入力してください');
    return false;
  }
  if (parseFloat(years) <= 0) {
    showError('想定居住年数は1年以上を入力してください');
    return false;
  }
  hideError();
  return true;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

/* =====================================================
   メイン計算実行（ボタン押下時）
   ===================================================== */
function calculate() {
  if (!validate()) { resetResult(); return; }
  const result = calcRentCost();
  displayResult(result);
  saveInputs();
}

/* =====================================================
   リアルタイム再計算（入力変更のたびに呼ばれる）
   家賃と年数が揃っていれば即計算、未入力はリセット
   ===================================================== */
function onInputChange() {
  const rent  = document.getElementById('rent').value.trim();
  const years = document.getElementById('years').value.trim();

  if (rent !== '' && years !== '' && parseFloat(years) > 0) {
    hideError();
    const result = calcRentCost();
    displayResult(result);
    saveInputs();
  } else {
    resetResult();
  }
}

/* =====================================================
   【コピーテキスト生成】
   入力値・計算式・結果をすべて含めた形式で返す
   ===================================================== */
function buildCopyText(r) {
  const i = r.inputs; // 入力値の参照

  // 「0円」の詳細項目は省略フラグ（入力されてないものはノイズになるため）
  const hasRenewal = i.renewal > 0 && i.renewalY > 0;
  const hasFire    = i.fire    > 0 && i.fireY    > 0;
  const hasHosho   = i.hosho   > 0 && i.hoshoY   > 0;

  const lines = [
    '【賃貸総額シミュレーター 計算結果】',
    '',
    '■ 入力値',
    `　月額家賃　　　：${formatYen(i.rent)}`,
  ];

  // 0円の項目は省略してスッキリさせる
  if (i.kanri   > 0) lines.push(`　共益費・管理費：${formatYen(i.kanri)}`);
  if (i.parking > 0) lines.push(`　駐車場代　　　：${formatYen(i.parking)}`);
  lines.push(`　居住年数　　　：${i.years}年`);

  if (hasRenewal) {
    lines.push(`　更新料　　　　：${formatYen(i.renewal)}（${i.renewalY}年ごと）`);
  }
  if (hasFire) {
    lines.push(`　火災保険料　　：${formatYen(i.fire)}（${i.fireY}年ごと）`);
  }
  if (hasHosho) {
    lines.push(`　保証会社更新料：${formatYen(i.hosho)}（${i.hoshoY}年ごと）`);
  }

  lines.push('');
  lines.push('■ 計算式');
  // 年間住居費の計算式
  const monthlyParts = [`${formatYen(i.rent)}（家賃）`];
  if (i.kanri   > 0) monthlyParts.push(`${formatYen(i.kanri)}（管理費）`);
  if (i.parking > 0) monthlyParts.push(`${formatYen(i.parking)}（駐車場）`);
  lines.push(`　年間住居費　　：(${monthlyParts.join(' + ')}) × 12ヶ月 ＝ ${formatYen(r.annual)}`);
  lines.push(`　家賃総額　　　：${formatYen(r.annual)} × ${i.years}年 ＝ ${formatYen(r.rentTotal)}`);

  if (hasRenewal) {
    lines.push(`　更新料総額　　：${formatYen(i.renewal)} × ${r.renewalCount}回 ＝ ${formatYen(r.renewalTotal)}`);
  }
  if (hasFire) {
    lines.push(`　火災保険総額　：${formatYen(i.fire)} × ${r.fireCount}回 ＝ ${formatYen(r.fireTotal)}`);
  }
  if (hasHosho) {
    lines.push(`　保証会社費用　：${formatYen(i.hosho)} × ${r.hoshoCount}回 ＝ ${formatYen(r.hoshoTotal)}`);
  }

  // 合計の計算式（0円の項目は省略）
  const sumParts = [formatYen(r.rentTotal) + '（家賃）'];
  if (hasRenewal) sumParts.push(formatYen(r.renewalTotal) + '（更新料）');
  if (hasFire)    sumParts.push(formatYen(r.fireTotal)    + '（火災保険）');
  if (hasHosho)   sumParts.push(formatYen(r.hoshoTotal)   + '（保証会社）');

  lines.push('');
  lines.push('■ 結果');
  if (sumParts.length > 1) {
    lines.push(`　${sumParts.join(' + ')}`);
  }
  lines.push(`　━━━━━━━━━━━━━━━━`);
  lines.push(`　賃貸コスト総額：${formatYen(r.grandTotal)}`);
  lines.push('');
  lines.push('🏠 賃貸総額シミュレーター');
  lines.push('https://arigato-tools.com/rent-simulator.html');

  return lines.join('\n');
}

/* =====================================================
   コピー処理
   ===================================================== */
function copyResult() {
  const r = calcRentCost();
  if (!r) return;

  const text = buildCopyText(r);
  const btn  = document.getElementById('btnCopy');

  // clipboard API → フォールバックの順で試みる
  const onSuccess = () => {
    btn.textContent = '✅ コピーしました！';
    setTimeout(() => { btn.textContent = '📋 結果をコピー'; }, 2000);
  };

  navigator.clipboard.writeText(text).then(onSuccess).catch(() => {
    // clipboard API非対応（古いブラウザ）向けフォールバック
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity  = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    onSuccess();
  });
}

/* =====================================================
   【シェアURL生成】
   クエリパラメータで入力値を引き継ぐ
   ===================================================== */
function buildShareUrl() {
  const params = new URLSearchParams();
  STORAGE_FIELDS.forEach(id => {
    const v = document.getElementById(id).value;
    if (v !== '') params.set(id, v);
  });
  const base = location.href.split('?')[0];
  const qs   = params.toString();
  return qs ? `${base}?${qs}` : base;
}

/* =====================================================
   【シェアテキスト生成】（𝕏・LINE共通）
   結果が出ているときは総額も添える
   ===================================================== */
function buildShareText() {
  const rent  = document.getElementById('rent').value.trim();
  const years = document.getElementById('years').value.trim();
  const hasResult = rent !== '' && years !== '' && parseFloat(years) > 0;

  if (hasResult) {
    const r = calcRentCost();
    return `🏠 賃貸総額シミュレーター\n${r.years}年間の賃貸コストを計算しました！\n総額：${formatYen(r.grandTotal)}`;
  }
  return '🏠 賃貸総額シミュレーター\n一生分の賃貸コストを簡単に計算できるツールです！';
}

/* =====================================================
   URLコピー（コピー完了フィードバックあり）
   ===================================================== */
function shareUrl() {
  const url = buildShareUrl();
  const btn = document.getElementById('btnShareUrl');

  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '🔗 URLをコピー';
      btn.classList.remove('copied');
    }, 2500);
  }).catch(() => {
    // clipboard API非対応のブラウザ向けフォールバック
    prompt('このURLをコピーしてください', url);
  });
}

/* =====================================================
   𝕏（Twitter）シェア
   ===================================================== */
function shareX() {
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(
    `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,
    '_blank'
  );
}

/* =====================================================
   LINEシェア
   スマホ：LINEアプリ起動 / PC：LINE for Chrome等が開く
   ===================================================== */
function shareLine() {
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(
    `https://line.me/R/msg/text/${encodeURIComponent(text)}`,
    '_blank'
  );
}

/* =====================================================
   localStorage：入力値を保存
   ===================================================== */
function saveInputs() {
  try {
    const data = {};
    STORAGE_FIELDS.forEach(id => {
      data[id] = document.getElementById(id).value;
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    // プライベートモード等でlocalStorageが使えない場合は無視
  }
}

/* =====================================================
   localStorage：入力値を復元して即計算
   詳細設定に値があればアコーディオンを自動展開する
   ===================================================== */
function restoreInputs() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;

    const data = JSON.parse(raw);
    STORAGE_FIELDS.forEach(id => {
      if (data[id] !== undefined && data[id] !== '') {
        document.getElementById(id).value = data[id];
      }
    });

    // 詳細設定に値があればアコーディオンを開く
    const hasDetail = ['renewal','renewalY','fire','fireY','hosho','hoshoY']
      .some(id => data[id] && data[id] !== '');
    if (hasDetail) {
      document.getElementById('detailToggleBtn').classList.add('open');
      document.getElementById('detailSection').classList.add('open');
    }

    // 復元後に自動計算
    onInputChange();
  } catch (e) {
    // パース失敗は無視（壊れたデータはそのまま）
  }
}

/* =====================================================
   URLクエリパラメータから入力値を復元（シェアURL対応）
   localStorage より優先して上書き
   ===================================================== */
(function restoreFromUrl() {
  const params = new URLSearchParams(location.search);
  let hasParam = false;
  STORAGE_FIELDS.forEach(id => {
    const v = params.get(id);
    if (v !== null) {
      document.getElementById(id).value = v;
      hasParam = true;
    }
  });
  // クエリパラメータがあれば即計算（DOMContentLoaded後に実行されるため別途必要）
  if (hasParam) {
    document.addEventListener('DOMContentLoaded', () => onInputChange());
  }
})();
</script>
