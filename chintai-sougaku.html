<style>
/* =====================================================
   CSS変数（色・サイズの一元管理）
   色変更はここだけ触ればOK
   ===================================================== */
:root {
  --color-primary:     #1a56db;
  --color-primary-hover: #1546b8;
  --color-primary-bg:  #e8f0fe;
  --color-primary-border: #c3d4f8;
  --color-bg:          #f4f6f9;
  --color-card:        #fff;
  --color-input-bg:    #f8fafd;
  --color-border:      #dde3ee;
  --color-border-input:#c7d0e0;
  --color-text:        #222;
  --color-text-sub:    #555;
  --color-text-muted:  #666;
  --color-text-label:  #aaa;
  --color-error-bg:    #fff1f1;
  --color-error-border:#fca5a5;
  --color-error-text:  #b91c1c;
  --radius-card:       10px;
  --radius-btn:        8px;
  --radius-input:      7px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--color-bg);
  color: var(--color-text);
  font-family: 'BIZ UDPGothic', sans-serif;
  min-height: 100vh;
  padding: 24px 14px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-text-size-adjust: 100%;
}

.container { width: 100%; max-width: 600px; }

/* ナビ：戻るボタン＋おすすめツール */
.back-to-index {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #f1f5fd;
  border: 1px solid var(--color-primary-border);
  border-radius: var(--radius-input);
  color: var(--color-primary);
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 12px;
  font-weight: 700;
  padding: 7px 13px;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.15s;
  white-space: nowrap;
}
.btn-back:hover { background: #dbeafe; }
.recommend-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  border-left: 2px solid var(--color-border);
  padding-left: 10px;
}
.recommend-label { font-size: 10px; color: var(--color-text-label); white-space: nowrap; }
.recommend-link {
  font-size: 11px;
  font-weight: 700;
  color: var(--color-primary);
  text-decoration: none;
  white-space: nowrap;
  background: var(--color-primary-bg);
  border-radius: 5px;
  padding: 3px 8px;
  transition: background 0.15s;
}
.recommend-link:hover { background: #dbeafe; }

/* 広告エリア（CLS対策：高さを固定で事前確保） */
.ad-area {
  width: 100%;
  background: var(--color-input-bg);
  border: 1px dashed var(--color-border-input);
  border-radius: var(--radius-card);
  margin-bottom: 14px;
  text-align: center;
  padding: 8px 0;
  height: 116px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.ad-area-label {
  font-size: 10px;
  color: #bbb;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}

/* ヘッダー */
header { text-align: center; margin-bottom: 22px; }
h1 {
  font-size: clamp(20px, 5vw, 26px);
  font-weight: 700;
  color: var(--color-primary);
  margin-bottom: 4px;
}
.subtitle {
  font-size: 11px;
  color: var(--color-text-muted);
  line-height: 1.8;
}

/* カード（入力・設定エリア共通） */
.card {
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

/* ラベル＋input共通 */
.input-group { margin-bottom: 14px; }
.input-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text-sub);
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}
.input-group input {
  width: 100%;
  border: 1px solid var(--color-border-input);
  border-radius: var(--radius-input);
  background: var(--color-input-bg);
  color: var(--color-text);
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 16px; /* ★iPhoneズーム防止のため16px以上必須 */
  padding: 10px 10px;
  outline: none;
  transition: border-color 0.18s;
  min-height: 44px; /* 片手タップのためのタッチターゲット確保 */
  -webkit-appearance: none;
  appearance: none;
}
.input-group input:focus { border-color: var(--color-primary); }

.input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.section-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}

/* =====================================================
   詳細設定アコーディオン（★このツール固有の追加パーツ）
   ・更新料／火災保険／保証会社をたたんでスマホ1画面に収める
   ・将来項目が増えても detail-section 内に足すだけでOK
   ===================================================== */
.detail-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 700;
  color: var(--color-primary);
  cursor: pointer;
  border: none;
  background: none;
  font-family: 'BIZ UDPGothic', sans-serif;
  padding: 8px 0;
  margin-bottom: 4px;
  user-select: none;
  width: 100%;
  text-align: left;
  min-height: 44px;
}
.detail-toggle .arrow {
  display: inline-block;
  transition: transform 0.2s;
  font-style: normal;
}
.detail-toggle.open .arrow { transform: rotate(90deg); }

.detail-section {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease;
}
.detail-section.open { max-height: 900px; }
.detail-inner { padding-top: 10px; }

/* 計算ボタン */
.btn-calc {
  width: 100%;
  background: var(--color-primary);
  border: none;
  border-radius: var(--radius-btn);
  color: #fff;
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 16px;
  font-weight: 700;
  padding: 14px;
  cursor: pointer;
  letter-spacing: 0.06em;
  transition: background 0.15s;
  min-height: 50px;
}
.btn-calc:hover { background: var(--color-primary-hover); }

/* エラーメッセージ */
.error-msg {
  display: none;
  background: var(--color-error-bg);
  border: 1px solid var(--color-error-border);
  border-radius: var(--radius-input);
  color: var(--color-error-text);
  font-size: 13px;
  padding: 9px 13px;
  margin-top: 10px;
}
.error-msg.show { display: block; }

/* 結果パネル */
.result-panel {
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  overflow: hidden;
}
.result-main {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: linear-gradient(135deg, #e8f0fe 0%, #f0fdf4 100%);
  border-bottom: 1px solid var(--color-border);
  padding: 20px 16px 16px;
  text-align: center;
}
.result-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.result-number {
  font-size: clamp(40px, 12vw, 64px); /* ★数字桁数が多いツールのため通常テンプレより控えめサイズ */
  font-weight: 700;
  color: #111;
  line-height: 1;
  word-break: break-all;
}
.result-number.placeholder { color: #bbb; }
.result-unit {
  font-size: 15px;
  color: var(--color-text-sub);
  font-weight: 700;
  margin-left: 4px;
}
.result-sub {
  font-size: 12px;
  color: var(--color-text-muted);
  margin-top: 6px;
}

/* サブ結果（内訳） */
.breakdown-wrap { padding: 16px; }
.breakdown {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 8px;
}
/* ★このツールはサブ結果が5つあるので2行目は2列で中央寄せ表示 */
.breakdown-row2 {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.breakdown-item {
  background: var(--color-input-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-btn);
  padding: 11px 6px;
  text-align: center;
}
.b-num {
  font-size: 18px; /* 5項目表示のため通常より小さめ */
  font-weight: 700;
  color: var(--color-text);
  word-break: break-all;
}
.b-num.placeholder { color: #ccc; }
.b-label {
  font-size: 11px;
  color: #777;
  margin-top: 2px;
}

/* 結果アクションボタン（テキストコピー／PDF／QR／Excelコピー） */
.copy-actions {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.btn-action {
  background: #f1f5fd;
  border: 1px solid var(--color-primary-border);
  border-radius: var(--radius-input);
  color: var(--color-primary);
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 13px;
  font-weight: 700;
  padding: 10px 6px;
  cursor: pointer;
  transition: background 0.15s;
  text-align: center;
  min-height: 44px;
}
.btn-action:hover { background: #dbeafe; }
.btn-action:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-action.copied {
  background: #d1fae5;
  border-color: #059669;
  color: #065f46;
}

/* シェアエリア */
.share-area {
  background: var(--color-card);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: 14px 16px;
  margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.share-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--color-text-muted);
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}
.share-btns {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.btn-share {
  padding: 10px 4px;
  border-radius: var(--radius-input);
  border: 1px solid var(--color-border);
  background: var(--color-input-bg);
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--color-text-muted);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  min-height: 44px;
}
.btn-share:hover {
  background: var(--color-primary-bg);
  border-color: var(--color-primary);
  color: var(--color-primary);
}
.btn-share.copied {
  background: #d1fae5;
  border-color: #059669;
  color: #065f46;
}
.btn-share.x-post {
  background: #000;
  border-color: #000;
  color: #fff;
}
.btn-share.x-post:hover { background: #222; border-color: #222; color: #fff; }
.btn-share.line {
  background: #e8f8ea;
  border-color: #06c755;
  color: #06c755;
}
.btn-share.line:hover { background: #c8f0cc; }
.btn-share.qr {
  background: #f3f0ff;
  border-color: #7c3aed;
  color: #7c3aed;
}
.btn-share.qr:hover { background: #ede9fe; }

/* QRコードモーダル */
.qr-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.qr-modal-overlay.show { display: flex; }
.qr-modal {
  background: #fff;
  border-radius: 14px;
  padding: 24px 20px 18px;
  text-align: center;
  max-width: 280px;
  width: 90%;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.22);
  position: relative;
}
.qr-modal-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--color-text-sub);
  margin-bottom: 14px;
  letter-spacing: 0.06em;
}
#qrCanvas {
  display: flex;
  justify-content: center;
  margin-bottom: 12px;
}
.qr-modal-url {
  font-size: 10px;
  color: #aaa;
  word-break: break-all;
  margin-bottom: 14px;
}
.qr-modal-close {
  background: var(--color-primary-bg);
  border: 1px solid var(--color-primary-border);
  border-radius: var(--radius-btn);
  color: var(--color-primary);
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 10px 24px;
  cursor: pointer;
  min-height: 44px;
  transition: background 0.15s;
}
.qr-modal-close:hover { background: #dbeafe; }

/* リセットボタン */
.btn-reset {
  width: 100%;
  background: #fff8f0;
  border: 1px solid #f5c6a0;
  border-radius: var(--radius-btn);
  color: #c05a00;
  font-family: 'BIZ UDPGothic', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 12px;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 14px;
  min-height: 44px;
  letter-spacing: 0.04em;
}
.btn-reset:hover { background: #ffe8d0; }

/* 下部ナビ */
.bottom-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

/* フッター */
footer {
  margin-top: 16px;
  text-align: center;
  font-size: 11px;
  color: var(--color-text-label);
}
.footer-back {
  display: inline-block;
  margin-top: 8px;
  color: var(--color-primary);
  font-size: 11px;
  text-decoration: none;
}
.footer-back:hover { text-decoration: underline; }

/* PDF作成用（印刷スタイル） */
#printArea { display: none; }
@media print {
  body * { visibility: hidden; }
  #printArea, #printArea * { visibility: visible; }
  #printArea {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    padding: 24px;
  }
  #printArea h2 { font-size: 18px; margin-bottom: 14px; }
  #printArea table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 18px;
  }
  #printArea th,
  #printArea td {
    border: 1px solid #ccc;
    padding: 6px 10px;
    font-size: 13px;
    text-align: left;
  }
  #printArea th { background: #f4f6f9; width: 40%; }
  #printArea .print-date { font-size: 11px; color: #888; margin-top: 20px; }
}
</style>

<div class="container">

  <!-- ナビ：ツール一覧に戻るボタン＋おすすめツール -->
  <div class="back-to-index">
    <a class="btn-back" href="/index.html">← ツール一覧に戻る</a>
    <div class="recommend-wrap">
      <span class="recommend-label">おすすめ：</span>
      <span id="recommendLinks">読み込み中…</span>
    </div>
  </div>

  <!-- 広告エリア（CLS対策：height固定で事前確保） -->
  <div class="ad-area">
    <div class="ad-area-label">スポンサー</div>
    <!-- ここにAdSenseコードを貼る -->
  </div>

  <!-- ヘッダー -->
  <header>
    <h1>🏠 賃貸総額シミュレーター</h1>
    <p class="subtitle">
      ※ 月額費用と居住年数を入力するだけで、一生分の賃貸コストを自動計算<br>
      ※ 賃貸と持ち家の比較検討にもご活用ください
    </p>
  </header>

  <!-- 入力カード -->
  <div class="card">
    <div class="section-title">▶ 基本情報</div>

    <div class="input-grid">
      <div class="input-group">
        <label for="rent">月額家賃（円）</label>
        <input type="number" id="rent" inputmode="decimal" placeholder="例：70000" min="0" oninput="onInputChange()">
      </div>
      <div class="input-group">
        <label for="kanri">共益費・管理費（円）</label>
        <input type="number" id="kanri" inputmode="decimal" placeholder="例：5000" min="0" oninput="onInputChange()">
      </div>
    </div>

    <div class="input-grid">
      <div class="input-group">
        <label for="parking">駐車場代（円）</label>
        <input type="number" id="parking" inputmode="decimal" placeholder="例：0" min="0" oninput="onInputChange()">
      </div>
      <div class="input-group">
        <label for="years">想定居住年数（年）</label>
        <input type="number" id="years" inputmode="decimal" placeholder="例：10" min="0" oninput="onInputChange()">
      </div>
    </div>

    <!-- 詳細設定アコーディオン：スマホ1画面に収めるため折りたたみ -->
    <button class="detail-toggle" id="detailToggleBtn" onclick="toggleDetail()" type="button">
      <span class="arrow">▶</span> 詳細設定（更新料・火災保険・保証会社）
    </button>

    <div class="detail-section" id="detailSection">
      <div class="detail-inner">

        <div class="section-title">▶ 更新料</div>
        <div class="input-grid">
          <div class="input-group">
            <label for="renewal">更新料（円）</label>
            <input type="number" id="renewal" inputmode="decimal" placeholder="例：55000" min="0" oninput="onInputChange()">
          </div>
          <div class="input-group">
            <label for="renewalY">更新年数（年）</label>
            <input type="number" id="renewalY" inputmode="decimal" placeholder="例：2" min="0" oninput="onInputChange()">
          </div>
        </div>

        <div class="section-title">▶ 火災保険</div>
        <div class="input-grid">
          <div class="input-group">
            <label for="fire">火災保険料（円）</label>
            <input type="number" id="fire" inputmode="decimal" placeholder="例：20000" min="0" oninput="onInputChange()">
          </div>
          <div class="input-group">
            <label for="fireY">更新年数（年）</label>
            <input type="number" id="fireY" inputmode="decimal" placeholder="例：2" min="0" oninput="onInputChange()">
          </div>
        </div>

        <div class="section-title">▶ 保証会社</div>
        <div class="input-grid">
          <div class="input-group">
            <label for="hosho">保証会社更新料（円）</label>
            <input type="number" id="hosho" inputmode="decimal" placeholder="例：10000" min="0" oninput="onInputChange()">
          </div>
          <div class="input-group">
            <label for="hoshoY">更新年数（年）</label>
            <input type="number" id="hoshoY" inputmode="decimal" placeholder="例：1" min="0" oninput="onInputChange()">
          </div>
        </div>

      </div><!-- /detail-inner -->
    </div><!-- /detail-section -->

    <button class="btn-calc" onclick="calculate()" type="button">計算する</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- 結果パネル -->
  <div class="result-panel">
    <div class="result-main">
      <div class="result-label">賃貸コスト総額</div>
      <div>
        <span class="result-number placeholder" id="resultNum">—</span>
        <span class="result-unit">円</span>
      </div>
      <div class="result-sub" id="resultSub"></div>
    </div>
    <div class="breakdown-wrap">

      <!-- 1行目：年間住居費・家賃総額・更新料総額 -->
      <div class="breakdown">
        <div class="breakdown-item">
          <div class="b-num placeholder" id="bAnnual">—</div>
          <div class="b-label">年間住居費</div>
        </div>
        <div class="breakdown-item">
          <div class="b-num placeholder" id="bRentTotal">—</div>
          <div class="b-label">家賃総額</div>
        </div>
        <div class="breakdown-item">
          <div class="b-num placeholder" id="bRenewalTotal">—</div>
          <div class="b-label">更新料総額</div>
        </div>
      </div>

      <!-- 2行目：火災保険総額・保証会社費用総額 -->
      <div class="breakdown-row2">
        <div class="breakdown-item">
          <div class="b-num placeholder" id="bFireTotal">—</div>
          <div class="b-label">火災保険総額</div>
        </div>
        <div class="breakdown-item">
          <div class="b-num placeholder" id="bHoshoTotal">—</div>
          <div class="b-label">保証会社費用総額</div>
        </div>
      </div>

      <!-- 結果アクションボタン（4種類） -->
      <div class="copy-actions">
        <button class="btn-action" id="btnCopyText" onclick="copyResultText()" disabled>📄 テキストでコピー</button>
        <button class="btn-action" id="btnPdf" onclick="createPDF()" disabled>📕 PDF作成</button>
        <button class="btn-action" id="btnQrInputs" onclick="showQrInputs()" disabled>📷 QRで送る</button>
        <button class="btn-action" id="btnCopyExcel" onclick="copyResultExcel()" disabled>📊 Excel用コピー</button>
      </div>
    </div>
  </div>

  <!-- シェアエリア（常時表示・4ボタン構成） -->
  <div class="share-area">
    <div class="share-title">▶ このツールをシェア</div>
    <div class="share-btns">
      <button class="btn-share" id="btnShareUrl" onclick="shareUrl()">🔗 URLをコピー</button>
      <button class="btn-share x-post" onclick="shareX()">𝕏 ポストする</button>
      <button class="btn-share line" onclick="shareLine()">💬 LINEで送る</button>
      <button class="btn-share qr" onclick="showQr()">📷 QRコード</button>
    </div>
  </div>

  <!-- リセットボタン -->
  <button class="btn-reset" onclick="resetAll()">🔄 入力値をリセット</button>

  <!-- 下部ナビ -->
  <div class="bottom-nav">
    <a class="btn-back" href="/index.html">← ツール一覧に戻る</a>
    <div class="recommend-wrap">
      <span class="recommend-label">おすすめ：</span>
      <span id="recommendLinks2">読み込み中…</span>
    </div>
  </div>

  <!-- 広告エリア（CLS対策：height固定で事前確保） -->
  <div class="ad-area">
    <div class="ad-area-label">スポンサー</div>
    <!-- ここにAdSenseコードを貼る -->
  </div>

</div><!-- /.container -->

<!-- QRコードモーダル -->
<div class="qr-modal-overlay" id="qrModalOverlay" onclick="closeQrOnOverlay(event)">
  <div class="qr-modal">
    <div class="qr-modal-title" id="qrModalTitle">📷 QRコードでシェア</div>
    <div id="qrCanvas"></div>
    <div class="qr-modal-url" id="qrUrl"></div>
    <button class="qr-modal-close" onclick="hideQr()">✕ 閉じる</button>
  </div>
</div>

<!-- PDF作成用の印刷専用エリア -->
<div id="printArea"></div>

<!-- フッター -->
<footer>
  © 2026 賃貸総額シミュレーター<br>
  <a class="footer-back" href="https://x.com/arigaitu" target="_blank" rel="noopener">🐦 作成者X</a>
  ・
  <a class="footer-back" href="https://docs.google.com/forms/d/e/1FAIpQLSfUe9UzcRcIRFb4TmDAYKsZ75CcGRjF8Z7Ar_u7a4KgyyNyzQ/viewform?usp=publish-editor" target="_blank" rel="noopener">💡 作ってほしいツール・ご意見はこちら</a>
</footer>

<script>
/* =====================================================
   設定（★ツールごとに書き換える）
   ===================================================== */
const CURRENT_TOOL_ID = 'chintai-sougaku';
const STORAGE_KEY = 'chintai-sougaku_inputs';

/* LocalStorageに保存したいinput/selectのid一覧 */
const STORAGE_FIELDS = ['rent','kanri','parking','years','renewal','renewalY','fire','fireY','hosho','hoshoY'];

/* 入力項目の表示ラベル（テキストコピー／Excelコピー／PDF出力で共通利用） */
const INPUT_LABELS = {
  rent:     '月額家賃',
  kanri:    '共益費・管理費',
  parking:  '駐車場代',
  years:    '想定居住年数',
  renewal:  '更新料',
  renewalY: '更新料の更新年数',
  fire:     '火災保険料',
  fireY:    '火災保険の更新年数',
  hosho:    '保証会社更新料',
  hoshoY:   '保証会社の更新年数',
};

/* 結果の表示ラベル（メイン・サブ結果） */
const RESULT_LABELS = {
  main:             '賃貸コスト総額',
  subAnnual:        '年間住居費',
  subRentTotal:     '家賃総額',
  subRenewalTotal:  '更新料総額',
  subFireTotal:     '火災保険総額',
  subHoshoTotal:    '保証会社費用総額',
};

/* =====================================================
   初期化
   ===================================================== */
document.addEventListener('DOMContentLoaded', () => {
  loadRecommends();
  restoreInputs();
});

/* =====================================================
   おすすめツール読み込み（tools.jsonから）
   ===================================================== */
async function loadRecommends() {
  try {
    const res = await fetch('/tools.json');
    const tools = await res.json();
    const others = tools.filter(t => t.id !== CURRENT_TOOL_ID);
    const picks = others.sort(() => Math.random() - 0.5).slice(0, 2);
    const html = picks.length > 0
      ? picks.map(t => `<a class="recommend-link" href="${t.url}">${t.emoji} ${t.name}</a>`).join('')
      : '';
    document.getElementById('recommendLinks').innerHTML = html;
    document.getElementById('recommendLinks2').innerHTML = html;
  } catch (e) {
    document.getElementById('recommendLinks').textContent = '';
    document.getElementById('recommendLinks2').textContent = '';
  }
}

/* =====================================================
   詳細設定アコーディオンの開閉
   ===================================================== */
function toggleDetail() {
  document.getElementById('detailToggleBtn').classList.toggle('open');
  document.getElementById('detailSection').classList.toggle('open');
}

/* =====================================================
   入力変更時のハンドラ（保存→計算を一括で呼ぶ）
   ===================================================== */
function onInputChange() {
  saveInputs();
  calculate();
}

/* =====================================================
   1項目の入力値を数値で取得（未入力・不正は0扱い）
   ===================================================== */
function getInputValue(id) {
  const val = parseFloat(document.getElementById(id).value);
  return isNaN(val) || val < 0 ? 0 : val;
}

/* =====================================================
   【入力取得】
   ===================================================== */
function calculateInputs() {
  return {
    rent:     getInputValue('rent'),
    kanri:    getInputValue('kanri'),
    parking:  getInputValue('parking'),
    years:    getInputValue('years'),
    renewal:  getInputValue('renewal'),
    renewalY: getInputValue('renewalY'),
    fire:     getInputValue('fire'),
    fireY:    getInputValue('fireY'),
    hosho:    getInputValue('hosho'),
    hoshoY:   getInputValue('hoshoY'),
  };
}

/* =====================================================
   【計算】
   家賃・管理費・駐車場代・更新料・火災保険・保証会社費用から
   賃貸コスト総額を算出する
   @param {object} inputs - calculateInputs()の戻り値
   @returns {object|null} 計算結果、必須項目未入力はnull
   ===================================================== */
function calculateResult(inputs) {
  const { rent, kanri, parking, years, renewal, renewalY, fire, fireY, hosho, hoshoY } = inputs;

  // バリデーション：家賃・居住年数は必須
  const rentRaw  = document.getElementById('rent').value.trim();
  const yearsRaw = document.getElementById('years').value.trim();
  if (rentRaw === '' || yearsRaw === '' || years <= 0) return null;

  // 年間住居費
  const annual = (rent + kanri + parking) * 12;

  // 家賃総額
  const rentTotal = annual * years;

  // 更新料総額：更新年数が0なら発生しない
  const renewalCount = renewalY > 0 ? Math.floor(years / renewalY) : 0;
  const renewalTotal = renewal * renewalCount;

  // 火災保険総額：更新年数が0なら発生しない
  const fireCount = fireY > 0 ? Math.floor(years / fireY) : 0;
  const fireTotal = fire * fireCount;

  // 保証会社費用総額：更新年数が0なら発生しない
  const hoshoCount = hoshoY > 0 ? Math.floor(years / hoshoY) : 0;
  const hoshoTotal = hosho * hoshoCount;

  // 賃貸コスト総額
  const main = rentTotal + renewalTotal + fireTotal + hoshoTotal;

  return {
    main,
    subAnnual: annual,
    subRentTotal: rentTotal,
    subRenewalTotal: renewalTotal,
    subFireTotal: fireTotal,
    subHoshoTotal: hoshoTotal,
    years,
  };
}

/* =====================================================
   【表示】
   ===================================================== */
function displayResult(result) {
  const numEl = document.getElementById('resultNum');
  numEl.textContent = result.main.toLocaleString();
  numEl.classList.remove('placeholder');

  document.getElementById('resultSub').textContent =
    result.years > 0 ? `${result.years}年間の賃貸コスト合計` : '';

  setBreakdown('bAnnual',       result.subAnnual);
  setBreakdown('bRentTotal',    result.subRentTotal);
  setBreakdown('bRenewalTotal', result.subRenewalTotal);
  setBreakdown('bFireTotal',    result.subFireTotal);
  setBreakdown('bHoshoTotal',   result.subHoshoTotal);

  ['btnCopyText', 'btnPdf', 'btnQrInputs', 'btnCopyExcel'].forEach(id => {
    document.getElementById(id).disabled = false;
  });
}

function setBreakdown(id, num) {
  const el = document.getElementById(id);
  el.textContent = num.toLocaleString();
  el.classList.remove('placeholder');
}

/* =====================================================
   計算メイン処理（入力取得→計算→表示）
   ===================================================== */
function calculate() {
  const inputs = calculateInputs();
  const result = calculateResult(inputs);

  const errEl = document.getElementById('errorMsg');

  if (result === null) {
    errEl.classList.remove('show');
    reset();
    return;
  }

  errEl.classList.remove('show');
  displayResult(result);
}

/* =====================================================
   リセット（プレースホルダー表示に戻す）
   ===================================================== */
function reset() {
  const numEl = document.getElementById('resultNum');
  numEl.textContent = '—';
  numEl.classList.add('placeholder');
  document.getElementById('resultSub').textContent = '';

  ['bAnnual','bRentTotal','bRenewalTotal','bFireTotal','bHoshoTotal'].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = '—';
    el.classList.add('placeholder');
  });

  ['btnCopyText', 'btnPdf', 'btnQrInputs', 'btnCopyExcel'].forEach(id => {
    document.getElementById(id).disabled = true;
  });
}

/* =====================================================
   1つのinput/selectから表示用の値を取得する
   ===================================================== */
function getInputDisplayValue(id) {
  const el = document.getElementById(id);
  if (!el) return '';
  if (el.type === 'checkbox') return el.checked ? 'ON' : 'OFF';
  if (el.tagName === 'SELECT') return el.options[el.selectedIndex]?.text ?? el.value;
  return el.value;
}

/* =====================================================
   入力条件を「ラベル：値」の配列で取得
   ===================================================== */
function buildConditionsLines() {
  return Object.keys(INPUT_LABELS).map(
    id => `${INPUT_LABELS[id]}：${getInputDisplayValue(id)}`
  );
}

/* =====================================================
   クリップボードコピー共通処理（ボタンのフィードバック付き）
   ===================================================== */
function copyToClipboard(text, btnId, label) {
  const btn = document.getElementById(btnId);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = label;
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

/* =====================================================
   ①結果をテキストでコピー（入力条件＋メイン結果のみ）
   ===================================================== */
function copyResultText() {
  const inputs = calculateInputs();
  const result = calculateResult(inputs);
  if (!result) return;

  const lines = [
    '【入力条件】',
    ...buildConditionsLines(),
    '',
    '【計算結果】',
    `${RESULT_LABELS.main}：${result.main.toLocaleString()}円`,
  ];

  copyToClipboard(lines.join('\n'), 'btnCopyText', '📄 テキストでコピー');
}

/* =====================================================
   ②PDF作成
   ===================================================== */
function createPDF() {
  const inputs = calculateInputs();
  const result = calculateResult(inputs);
  if (!result) return;

  const conditionsRows = buildConditionsLines()
    .map(line => {
      const [label, ...rest] = line.split('：');
      return `<tr><th>${label}</th><td>${rest.join('：')}</td></tr>`;
    })
    .join('');

  const resultRows = Object.keys(RESULT_LABELS)
    .filter(key => key in result)
    .map(key => `<tr><th>${RESULT_LABELS[key]}</th><td>${result[key].toLocaleString()}円</td></tr>`)
    .join('');

  const now = new Date().toLocaleString('ja-JP');

  document.getElementById('printArea').innerHTML = `
    <h2>賃貸総額シミュレーター 計算結果</h2>
    <table>${conditionsRows}</table>
    <table>${resultRows}</table>
    <div class="print-date">出力日時：${now}</div>
  `;

  window.print();
}

/* =====================================================
   ③QRコードで入力値を送る
   ===================================================== */
function buildShareUrlWithInputs() {
  const params = new URLSearchParams();
  STORAGE_FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    params.set(id, el.value);
  });
  return location.href.split('?')[0] + '?' + params.toString();
}

function showQrInputs() {
  const inputs = calculateInputs();
  const result = calculateResult(inputs);
  if (!result) return;
  showQr(buildShareUrlWithInputs(), '📷 入力値付きQRコード');
}

/* =====================================================
   ④Excel用コピー（入力条件＋詳細結果、タブ区切り）
   ===================================================== */
function copyResultExcel() {
  const inputs = calculateInputs();
  const result = calculateResult(inputs);
  if (!result) return;

  const rows = [
    ...buildConditionsLines().map(line => line.split('：').join('\t')),
    ...Object.keys(RESULT_LABELS)
      .filter(key => key in result)
      .map(key => `${RESULT_LABELS[key]}\t${result[key].toLocaleString()}円`),
  ];

  copyToClipboard(rows.join('\n'), 'btnCopyExcel', '📊 Excel用コピー');
}

/* =====================================================
   LocalStorage：入力値を保存
   ===================================================== */
function saveInputs() {
  try {
    const data = {};
    STORAGE_FIELDS.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      data[id] = el.value;
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    // プライベートモード等でlocalStorageが使えない場合は無視
  }
}

/* =====================================================
   LocalStorage：入力値を復元
   復元後に詳細設定に値があればアコーディオンを自動で開く
   ===================================================== */
function restoreInputs() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;

    const data = JSON.parse(raw);
    STORAGE_FIELDS.forEach(id => {
      if (!(id in data) || data[id] === '') return;
      const el = document.getElementById(id);
      if (!el) return;
      el.value = data[id];
    });

    const hasDetail = ['renewal','renewalY','fire','fireY','hosho','hoshoY']
      .some(id => data[id] && data[id] !== '');
    if (hasDetail) {
      document.getElementById('detailToggleBtn').classList.add('open');
      document.getElementById('detailSection').classList.add('open');
    }

    calculate();
  } catch (e) {
    // パース失敗時は無視
  }
}

/* =====================================================
   入力値リセット
   ===================================================== */
function resetAll() {
  STORAGE_FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.value = '';
  });

  document.getElementById('detailToggleBtn').classList.remove('open');
  document.getElementById('detailSection').classList.remove('open');

  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}

  document.getElementById('errorMsg').classList.remove('show');
  reset();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}

/* =====================================================
   【シェア用URL生成】
   入力値をそのままURLに引き継ぐ（QRコード「入力値付き」ボタンと役割を分けるため
   通常シェアは現在のURLのみ。入力値引き継ぎしたい場合はbuildShareUrlWithInputs()を使う）
   ===================================================== */
function buildShareUrl() {
  return location.href.split('?')[0];
}

/* =====================================================
   【シェア用テキスト生成】
   ===================================================== */
function buildShareText(result) {
  return `賃貸総額シミュレーター\n一生で払う家賃・賃貸コストの総額をサクッと計算できるツールです！`;
}

/* =====================================================
   URLコピー
   ===================================================== */
function shareUrl() {
  const url = buildShareUrl();
  const btn = document.getElementById('btnShareUrl');

  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '🔗 URLをコピー';
      btn.classList.remove('copied');
    }, 2500);
  }).catch(() => {
    prompt('このURLをコピーしてください', url);
  });
}

/* =====================================================
   𝕏（Twitter）シェア
   ===================================================== */
function shareX() {
  const text = buildShareText(null) + '\n' + buildShareUrl();
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
}

/* =====================================================
   LINEシェア
   ===================================================== */
function shareLine() {
  const text = buildShareText(null) + '\n' + buildShareUrl();
  window.open(`https://line.me/R/msg/text/${encodeURIComponent(text)}`, '_blank');
}

/* =====================================================
   QRコード表示
   ===================================================== */
function showQr(customUrl, customTitle) {
  const url = customUrl || buildShareUrl();

  document.getElementById('qrModalTitle').textContent = customTitle || '📷 QRコードでシェア';
  document.getElementById('qrModalOverlay').classList.add('show');
  document.getElementById('qrUrl').textContent = url;

  const canvas = document.getElementById('qrCanvas');
  canvas.innerHTML = '';

  new QRCode(canvas, {
    text: url,
    width: 200,
    height: 200,
    colorDark:  '#111111',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

function hideQr() {
  document.getElementById('qrModalOverlay').classList.remove('show');
}

function closeQrOnOverlay(e) {
  if (e.target === document.getElementById('qrModalOverlay')) hideQr();
}
</script>
