<script>
/* =====================================================
   設定（★ツールごとに書き換える）
   ===================================================== */

// tools.json内のid（おすすめから自分自身を除外するため）
const CURRENT_TOOL_ID = 'jidouteate-calculator';

// localStorage保存キー（ツール固有の名前にする）
const STORAGE_KEY = 'jidouteate-calculator_inputs';

/* =====================================================
   状態管理
   ===================================================== */

// 最後に計算した結果を保持（シェア・コピー時に参照）
let lastResult = null;

/* =====================================================
   初期化
   ===================================================== */
document.addEventListener('DOMContentLoaded', () => {
  loadRecommends();  // おすすめツールを非同期で読み込む
  restoreInputs();   // localStorageから入力値を復元
});

/* =====================================================
   おすすめツール読み込み（tools.jsonから動的取得）
   ===================================================== */
async function loadRecommends() {
  try {
    const res = await fetch('/tools.json');
    const tools = await res.json();

    // 自分以外をシャッフルして2件表示
    const others = tools.filter(t => t.id !== CURRENT_TOOL_ID);
    const picks = others.sort(() => Math.random() - 0.5).slice(0, 2);
    const wrap = document.getElementById('recommendLinks');

    if (picks.length === 0) { wrap.textContent = ''; return; }
    wrap.innerHTML = picks.map(t =>
      `<a class="recommend-link" href="${t.url}">${t.emoji} ${t.name}</a>`
    ).join('');
  } catch (e) {
    document.getElementById('recommendLinks').textContent = '';
  }
}

/* =====================================================
   子ども行の追加
   @param {string} birthDateValue - 復元時に渡す日付（通常は空文字）
   ===================================================== */
function addChildRow(birthDateValue = '') {
  const container = document.getElementById('childrenContainer');
  const rowCount = container.children.length;
  const childIndex = rowCount + 1;

  const row = document.createElement('div');
  row.className = 'child-row';
  row.id = `childRow_${childIndex}`;

  // 第1子は削除ボタンなし、第2子以降は削除ボタンあり
  const removeBtn = rowCount > 0
    ? `<button class="btn-remove" onclick="removeChildRow('childRow_${childIndex}')">削除</button>`
    : '';

  row.innerHTML = `
    <span class="child-label">第${childIndex}子：</span>
    <input
      type="date"
      id="birth_${childIndex}"
      class="child-birth-input"
      value="${birthDateValue}"
      onchange="saveInputs()"
    >
    ${removeBtn}
  `;
  container.appendChild(row);
  saveInputs();
}

/* =====================================================
   子ども行の削除（削除後に番号を振り直す）
   @param {string} rowId - 削除する行のid
   ===================================================== */
function removeChildRow(rowId) {
  const row = document.getElementById(rowId);
  if (!row) return;
  row.remove();
  reindexChildRows(); // 番号振り直し
  saveInputs();
}

/* =====================================================
   子ども行の番号振り直し（削除後に呼ぶ）
   ===================================================== */
function reindexChildRows() {
  const container = document.getElementById('childrenContainer');
  Array.from(container.children).forEach((row, index) => {
    const childIndex = index + 1;
    row.id = `childRow_${childIndex}`;

    // ラベル更新
    const label = row.querySelector('.child-label');
    if (label) label.textContent = `第${childIndex}子：`;

    // input id更新
    const input = row.querySelector('.child-birth-input');
    if (input) input.id = `birth_${childIndex}`;

    // 削除ボタン：第1子はなし、第2子以降はあり
    const existingBtn = row.querySelector('.btn-remove');
    if (index === 0 && existingBtn) {
      existingBtn.remove();
    } else if (index > 0 && !existingBtn) {
      const btn = document.createElement('button');
      btn.className = 'btn-remove';
      btn.textContent = '削除';
      btn.onclick = () => removeChildRow(row.id);
      row.appendChild(btn);
    } else if (existingBtn) {
      // onclick を更新（idが変わるため）
      existingBtn.onclick = () => removeChildRow(row.id);
    }
  });
}

/* =====================================================
   【入力取得】子どもの生年月日リストを返す
   @returns {Array<{birthDate: string}>}
   ===================================================== */
function calculateInputs() {
  const container = document.getElementById('childrenContainer');
  const dateInputs = container.querySelectorAll('.child-birth-input');
  const inputs = [];
  dateInputs.forEach(input => {
    if (input.value) inputs.push({ birthDate: input.value });
  });
  return inputs;
}

/* =====================================================
   年月時点での年齢情報を計算するヘルパー
   @param {string} birthDateStr - 生年月日（YYYY-MM-DD）
   @param {number} targetYear   - 対象年
   @param {number} targetMonth  - 対象月（1〜12）
   @returns {{ currentAge: number, fiscalEndAge: number }}
     currentAge    : その年月時点の満年齢
     fiscalEndAge  : その年度末（3/31）時点の満年齢（支給対象判定に使用）
   ===================================================== */
function getAgeInfoAt(birthDateStr, targetYear, targetMonth) {
  const birth = new Date(birthDateStr);

  // 満年齢（その月時点）
  let age = targetYear - birth.getFullYear();
  if (targetMonth < (birth.getMonth() + 1)) age--;

  // 年度末（翌3/31）時点の年齢
  // 4月〜3月を1年度とみなし、1〜3月は前年度扱い
  const fiscalYear = targetMonth <= 3 ? targetYear - 1 : targetYear;
  const fiscalYearEnd = new Date(fiscalYear + 1, 2, 31); // 翌3/31

  let ageAtFiscalEnd = fiscalYearEnd.getFullYear() - birth.getFullYear();
  const mDiff = fiscalYearEnd.getMonth() - birth.getMonth();
  if (mDiff < 0 || (mDiff === 0 && fiscalYearEnd.getDate() < birth.getDate())) {
    ageAtFiscalEnd--;
  }

  return { currentAge: age, fiscalEndAge: ageAtFiscalEnd };
}

/* =====================================================
   【計算】2024年10月新制度に基づく児童手当を計算
   @param {Array} childrenInputs - calculateInputs()の戻り値
   @returns {object|null} 計算結果、入力なしはnull

   【新制度の概要（2024年10月〜）】
   ・所得制限なし
   ・支給対象：高校生年代（年度末18歳）まで
   ・カウント対象：年度末22歳まで（多子加算の人数カウントのみ）
   ・月額：3歳未満15,000円 / 3〜高校生10,000円 / 第3子以降30,000円
   ===================================================== */
function calculateResult(childrenInputs) {
  if (!childrenInputs || childrenInputs.length === 0) return null;

  // 年齢の古い順（生年月日昇順）に並び替え（多子カウントの基準）
  const sortedChildren = childrenInputs
    .map((child, index) => ({
      originalIndex: index + 1, // 入力順の番号
      birthDate: child.birthDate,
      birthYear: new Date(child.birthDate).getFullYear()
    }))
    .sort((a, b) => new Date(a.birthDate) - new Date(b.birthDate));

  // ── 現在の月額を計算 ──
  const today = new Date();
  const currentYear = today.getFullYear();
  const currentMonth = today.getMonth() + 1;

  let currentMonthlyTotal = 0;
  const currentDetails = [];
  let currentCountIndex = 0;

  sortedChildren.forEach(child => {
    const ageInfo = getAgeInfoAt(child.birthDate, currentYear, currentMonth);
    const isCountTarget   = ageInfo.fiscalEndAge <= 22; // 多子カウント対象
    const isReceiveTarget = ageInfo.fiscalEndAge <= 18; // 支給対象

    if (isCountTarget) currentCountIndex++;

    if (isReceiveTarget) {
      let allowance = 0;
      let statusText = '';

      if (currentCountIndex >= 3) {
        // 第3子以降：多子加算
        allowance = 30000;
        statusText = `第${currentCountIndex}子（多子加算）`;
      } else if (ageInfo.currentAge < 3) {
        // 3歳未満
        allowance = 15000;
        statusText = `第${currentCountIndex}子（3歳未満）`;
      } else {
        // 3歳〜高校生年代
        allowance = 10000;
        statusText = `第${currentCountIndex}子（3歳以上〜高校生）`;
      }

      currentMonthlyTotal += allowance;
      currentDetails.push(`第${child.originalIndex}子：月額 ${allowance.toLocaleString()}円（${statusText}）`);

    } else if (isCountTarget) {
      // 支給なし・カウントのみ（大学生年代）
      currentDetails.push(`第${child.originalIndex}子：支給なし（第${currentCountIndex}子としてカウントのみ）`);
    } else {
      // 対象外
      currentDetails.push(`第${child.originalIndex}子：対象外`);
    }
  });

  // ── 年次シミュレーション（年度ごと） ──
  const startYear = Math.min(...sortedChildren.map(c => c.birthYear));
  const endYear   = Math.max(...sortedChildren.map(c => new Date(c.birthDate).getFullYear() + 19));

  const yearlySimulation = [];

  // 各子どもの生涯累計（縦合計）
  const verticalTotals = {};
  sortedChildren.forEach(c => { verticalTotals[c.originalIndex] = 0; });
  let grandTotal = 0;

  for (let y = startYear; y <= endYear; y++) {
    const childAmounts = {};
    sortedChildren.forEach(c => { childAmounts[c.originalIndex] = 0; });
    let rowTotal = 0;

    // 4月〜翌3月（月=4〜15で表現し、>12は翌年扱い）
    for (let m = 4; m <= 15; m++) {
      const calcYear  = m > 12 ? y + 1 : y;
      const calcMonth = m > 12 ? m - 12 : m;

      let activeCountIndex = 0;

      sortedChildren.forEach(child => {
        const birth = new Date(child.birthDate);
        // 誕生月以前はスキップ
        if (new Date(calcYear, calcMonth - 1, 1) < new Date(birth.getFullYear(), birth.getMonth(), 1)) return;

        const ageInfo = getAgeInfoAt(child.birthDate, calcYear, calcMonth);
        const isCountTarget   = ageInfo.fiscalEndAge <= 22;
        const isReceiveTarget = ageInfo.fiscalEndAge <= 18;

        if (isCountTarget) activeCountIndex++;

        if (isReceiveTarget) {
          let monthlyAllowance = 0;
          if (activeCountIndex >= 3) {
            monthlyAllowance = 30000;
          } else if (ageInfo.currentAge < 3) {
            monthlyAllowance = 15000;
          } else {
            monthlyAllowance = 10000;
          }
          childAmounts[child.originalIndex] += monthlyAllowance;
          rowTotal += monthlyAllowance;
          verticalTotals[child.originalIndex] += monthlyAllowance;
        }
      });
    }

    // 受給額がある年度のみ追加
    if (rowTotal > 0) {
      grandTotal += rowTotal;
      yearlySimulation.push({ year: y, childAmounts, total: rowTotal });
    }
  }

  return {
    monthly:          currentMonthlyTotal,
    yearly:           currentMonthlyTotal * 12,
    details:          currentDetails,
    sortedChildren,
    simulation:       yearlySimulation,
    verticalTotals,
    grandTotal
  };
}

/* =====================================================
   【表示】計算結果をDOMに反映する
   @param {object} result - calculateResult()の戻り値
   ===================================================== */
function displayResult(result) {
  // メイン：月額・年額
  document.getElementById('resultNum').textContent = result.monthly.toLocaleString();
  document.getElementById('resultSub').textContent
    = `年額 ${result.yearly.toLocaleString()} 円（月額 × 12ヶ月）`;

  // 子ども別内訳
  const detailsWrap = document.getElementById('detailsWrap');
  detailsWrap.innerHTML = result.details
    .map(text => `<div class="detail-item">${text}</div>`)
    .join('');

  // テーブルヘッダー生成
  const headerRow = document.getElementById('tableHeader');
  headerRow.innerHTML = '<th>年度</th>';
  result.sortedChildren.forEach(child => {
    headerRow.innerHTML += `<th>第${child.originalIndex}子</th>`;
  });
  headerRow.innerHTML += '<th>年間合計</th>';

  // テーブルボディ生成（年度ごとの行）
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  result.simulation.forEach(row => {
    const tr = document.createElement('tr');
    let content = `<td>${row.year}年度</td>`;
    result.sortedChildren.forEach(child => {
      const amt = row.childAmounts[child.originalIndex] || 0;
      content += `<td>${amt > 0 ? amt.toLocaleString() + '円' : '−'}</td>`;
    });
    content += `<td class="col-total">${row.total.toLocaleString()}円</td>`;
    tr.innerHTML = content;
    tbody.appendChild(tr);
  });

  // テーブルフッター（生涯累計）
  const tfoot = document.getElementById('tableFooter');
  tfoot.innerHTML = '';
  const footerTr = document.createElement('tr');
  footerTr.className = 'tfoot-row';
  let footContent = '<td>生涯累計</td>';
  result.sortedChildren.forEach(child => {
    const amt = result.verticalTotals[child.originalIndex] || 0;
    footContent += `<td>${amt.toLocaleString()}円</td>`;
  });
  footContent += `<td class="col-grand-total">${result.grandTotal.toLocaleString()}円</td>`;
  footerTr.innerHTML = footContent;
  tfoot.appendChild(footerTr);

  // 結果パネルとシェアエリアを表示
  document.getElementById('resultPanel').style.display = 'block';
  // シェアエリアは常時表示のため制御不要

  // スムーズスクロールで結果に移動
  document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth' });
}

/* =====================================================
   計算メイン処理（入力取得 → 計算 → 表示）
   ===================================================== */
function calculate() {
  const inputs = calculateInputs();
  const errEl  = document.getElementById('errorMsg');

  // バリデーション：1人も入力されていない場合
  if (inputs.length === 0) {
    errEl.textContent = 'お子様の生年月日を入力してください。';
    errEl.classList.add('show');
    return;
  }

  errEl.classList.remove('show');

  const result = calculateResult(inputs);
  if (!result) return;

  lastResult = result; // シェア・コピー用に保持
  displayResult(result);
}

/* =====================================================
   【コピー文字列生成】クリップボードに書き込むテキスト
   @returns {string}
   ===================================================== */
function buildCopyText() {
  if (!lastResult) return '';
  const r = lastResult;

  let text = `【児童手当シミュレーター 計算結果】\n`;
  text += `■ 現在の支給月額：${r.monthly.toLocaleString()} 円\n`;
  text += `■ 現在の支給年額：${r.yearly.toLocaleString()} 円\n\n`;
  text += `【現在の内訳】\n`;
  r.details.forEach(d => { text += `・${d}\n`; });
  text += `\n【年次受給シミュレーション】\n`;

  // テーブルヘッダー
  let headerStr = `年度\t`;
  r.sortedChildren.forEach(c => { headerStr += `第${c.originalIndex}子\t`; });
  text += headerStr + `年間合計\n`;

  // テーブル本体
  r.simulation.forEach(row => {
    let rowStr = `${row.year}年度\t`;
    r.sortedChildren.forEach(c => {
      const amt = row.childAmounts[c.originalIndex] || 0;
      rowStr += `${amt > 0 ? amt.toLocaleString() + '円' : '−'}\t`;
    });
    text += rowStr + `${row.total.toLocaleString()}円\n`;
  });

  // 生涯累計
  let footerStr = `生涯累計\t`;
  r.sortedChildren.forEach(c => {
    footerStr += `${(r.verticalTotals[c.originalIndex] || 0).toLocaleString()}円\t`;
  });
  text += footerStr + `${r.grandTotal.toLocaleString()}円\n\n`;
  text += `※2024年10月新制度に基づく試算です。\n`;

  return text;
}

/* =====================================================
   コピー処理
   ===================================================== */
function copyResult() {
  const text = buildCopyText();
  if (!text) return;

  const btn = document.getElementById('btnCopy');

  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ コピーしました！';
    setTimeout(() => { btn.textContent = '📋 結果をコピー'; }, 2000);
  }).catch(() => {
    // clipboard API非対応のブラウザ向けフォールバック
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✅ コピーしました！';
    setTimeout(() => { btn.textContent = '📋 結果をコピー'; }, 2000);
  });
}

/* =====================================================
   localStorageへの保存（子ども全員分をJSONで保存）
   ===================================================== */
function saveInputs() {
  try {
    const inputs = calculateInputs();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(inputs));
  } catch (e) {
    // プライベートモード等で使えない場合は無視
  }
}

/* =====================================================
   localStorageから復元（起動時に呼ぶ）
   ===================================================== */
function restoreInputs() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) {
      addChildRow(); // データなし：初期行を1つ追加
      return;
    }
    const inputs = JSON.parse(raw);
    if (inputs.length > 0) {
      inputs.forEach(item => addChildRow(item.birthDate || ''));
      calculate(); // 復元後に自動計算
    } else {
      addChildRow();
    }
  } catch (e) {
    addChildRow(); // パース失敗時は初期行を1つ
  }
}

/* =====================================================
   【シェアURL生成】このツールのURLを返す
   ★ クエリパラメータで入力値を引き継ぎたい場合はここを書き換える
   ===================================================== */
function buildShareUrl() {
  return location.href.split('?')[0];
}

/* =====================================================
   【シェアテキスト生成】𝕏・LINE共通テキスト
   ===================================================== */
function buildShareText() {
  // ツール紹介テキスト（結果が出ていれば月額も添える）
  let text = `👶 児童手当シミュレーター\n`
    + `生年月日を入れるだけで月額・生涯累計を自動計算！2024年10月新制度対応。`;
  if (lastResult) {
    text += `\n（試算例：月額 ${lastResult.monthly.toLocaleString()}円 / 生涯 ${lastResult.grandTotal.toLocaleString()}円）`;
  }
  return text;
}

/* =====================================================
   URLコピー
   ===================================================== */
function shareUrl() {
  const url = buildShareUrl();
  const btn = document.getElementById('btnShareUrl');

  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '🔗 URLをコピー';
      btn.classList.remove('copied');
    }, 2500);
  }).catch(() => {
    prompt('このURLをコピーしてください', url);
  });
}

/* =====================================================
   𝕏（Twitter）シェア
   ===================================================== */
function shareX() {
  if (!lastResult) return;
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(
    `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,
    '_blank'
  );
}

/* =====================================================
   LINEシェア
   ===================================================== */
function shareLine() {
  if (!lastResult) return;
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(
    `https://line.me/R/msg/text/${encodeURIComponent(text)}`,
    '_blank'
  );
}
