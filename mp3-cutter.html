<style>
/* =====================================================
   CSS変数（色・サイズの一元管理）

</head>
<body>

<div class="container">

      <div class="input-group">

    <button class="btn-calc" id="btnRunSplit" onclick="calculate()" disabled>音声を切り出す</button>

      <div class="result-sub" id="resultSub">切り出した音声ファイルはローカル保存用のWAV形式になります。</div> </div>

<script>
/* =====================================================
   共通音声エンジン (AudioSplitter) のインスタンス化
   ===================================================== */
const splitter = new AudioSplitter();
let fileLoaded = false;
let objectUrl = null;

// テンプレート基準の必須変数定義
const CURRENT_TOOL_ID = "mp3-cutter";
const STORAGE_KEY     = "arigato_mp3_cutter_settings";
const STORAGE_FIELDS  = ["startTime", "endTime"];

/* =====================================================
   初期化処理 (DOMイベント接続)
   ===================================================== */
document.addEventListener('DOMContentLoaded', () => {
  loadRecommends();
  restoreInputs();
  
  // ドラッグ＆ドロップ用イベントリスナーを設定
  const dropzone = document.getElementById('dropzone');
  
  // ドラッグが重なった時
  dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropzone.classList.add('dragover');
  });
  
  // ドラッグが離れた時
  dropzone.addEventListener('dragleave', () => {
    dropzone.classList.remove('dragover');
  });
  
  // ドロップされた時
  dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');
    
    if (e.dataTransfer.files && e.dataTransfer.files[0]) {
      processFile(e.dataTransfer.files[0]);
    }
  });
});

/* =====================================================
   おすすめツール動的読み込み
   ===================================================== */
async function loadRecommends() {
  try {
    const res = await fetch('tools.json');
    if (!res.ok) return;
    const list = await res.json();
    const filtered = list.filter(t => t.id !== CURRENT_TOOL_ID && t.active !== false);
    const picks = [];
    while (picks.length < 3 && filtered.length > 0) {
      const idx = Math.floor(Math.random() * filtered.length);
      picks.push(filtered.splice(idx, 1)[0]);
    }
    const html = picks.length > 0 ? picks.map(t => `<a class="recommend-link" href="${t.url}">${t.emoji} ${t.name}</a>`).join('') : '';
    document.getElementById('recommendLinks').innerHTML = html;
    document.getElementById('recommendLinks2').innerHTML = html;
  } catch (e) {
    document.getElementById('recommendLinks').textContent = '';
    document.getElementById('recommendLinks2').textContent = '';
  }
}

/* =====================================================
   音声ファイル選択・ドロップ時のコア処理
   ===================================================== */
async function processFile(file) {
  if (!file) return;
  
  document.getElementById('fileZoneText').innerHTML = `選択中:<br><strong>${file.name}</strong>`;
  document.getElementById('resultNum').textContent = "音声データ処理中...";
  document.getElementById('resultNum').classList.remove('placeholder');
  
  try {
    // 共通エンジン側で音声データをデコード
    const duration = await splitter.loadFile(file);
    fileLoaded = true;
    
    // 入力エリアをアンロック
    document.getElementById('startTime').disabled = false;
    document.getElementById('endTime').disabled = false;
    document.getElementById('btnRunSplit').disabled = false;
    
    // 終了位置の最大値をプレースホルダーへ反映、未入力なら最大値
    const formattedDuration = Math.round(duration * 10) / 10;
    document.getElementById('endTime').placeholder = `最大: ${formattedDuration}秒`;
    
    if (!document.getElementById('endTime').value) {
      document.getElementById('endTime').value = formattedDuration;
    }
    
    document.getElementById('resultNum').textContent = "読み込み完了！範囲を指定してください";
    hideError();
    onInputChange();
  } catch (err) {
    showError("音声のデコードに失敗しました。対応していないファイルフォーマットか、ファイルが破損しています。");
    document.getElementById('resultNum').textContent = "読み込みエラー";
  }
}

function onInputChange() {
  saveInputs();
  // ファイルが読み込まれていれば、リアルタイムに切り出しのバリデーションチェック等を走らせることも可能
}

/* =====================================================
   音声切り出し実行
   ===================================================== */
function calculate() {
  if (!fileLoaded) return;
  hideError();
  
  const start = parseFloat(document.getElementById('startTime').value) || 0;
  const end   = parseFloat(document.getElementById('endTime').value) || 0;
  
  if (start < 0 || end < 0) {
    showError("時間は0以上の数値を入力してください。");
    return;
  }
  if (start >= end) {
    showError("カット終了時間は、開始時間よりも大きな値を指定してください。");
    return;
  }
  
  document.getElementById('resultNum').textContent = "切り出し中...";
  
  // わずかな遅延を入れることでUIのフリーズ感を軽減し「処理中」を視覚認知させる
  setTimeout(() => {
    try {
      const wavBlob = splitter.split(start, end);
      
      if (objectUrl) {
        URL.revokeObjectURL(objectUrl);
      }
      objectUrl = URL.createObjectURL(wavBlob);
      
      const btnDl = document.getElementById('btnDownloadWav');
      btnDl.href = objectUrl;
      btnDl.classList.add('active');
      
      document.getElementById('resultNum').textContent = "切り出し成功！";
      document.getElementById('resultSub').textContent = `指定区間（${start}秒 〜 ${end}秒）をWAV形式に書き出しました。下のボタンから保存してください。`;
    } catch (err) {
      showError("切り出し処理に失敗しました: " + err.message);
      document.getElementById('resultNum').textContent = "処理失敗";
    }
  }, 100);
}

/* =====================================================
   ユーティリティ（エラー・ストレージ）
   ===================================================== */
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() {
  document.getElementById('errorMsg').classList.remove('show');
}

function saveInputs() {
  const data = {};
  STORAGE_FIELDS.forEach(id => {
    data[id] = document.getElementById(id).value;
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function restoreInputs() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    STORAGE_FIELDS.forEach(id => {
      if (id in data) document.getElementById(id).value = data[id];
    });
  } catch (e) {}
}

/* =====================================================
   全リセット（すべての状態を初期化）
   ===================================================== */
function resetAll() {
  fileLoaded = false;
  document.getElementById('audioFileInput').value = '';
  document.getElementById('fileZoneText').innerHTML = "タップまたはファイルをここに<br>ドラッグ＆ドロップして選択";
  
  STORAGE_FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.value = '';
      el.disabled = true;
    }
  });
  
  document.getElementById('btnRunSplit').disabled = true;
  
  if (objectUrl) {
    URL.revokeObjectURL(objectUrl);
    objectUrl = null;
  }
  
  const btnDl = document.getElementById('btnDownloadWav');
  btnDl.href = '#';
  btnDl.classList.remove('active');
  
  document.getElementById('resultNum').textContent = "ファイル未読込";
  document.getElementById('resultNum').classList.add('placeholder');
  document.getElementById('resultSub').textContent = "切り出した音声ファイルはローカル保存用のWAV形式になります。";
  
  hideError();
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch(e){}
}

/* =====================================================
   シェア機能用ロジック
   ===================================================== */
function buildShareUrl() {
  return window.location.href.split('?')[0];
}

function buildShareText() {
  return "【ありがとツールズ】インストール不要！ブラウザ上で安全＆高速に音楽ファイルをカット・切り出しできる無料Webツール。";
}

function copyUrl(btn) {
  const url = buildShareUrl();
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '🔗 URLをコピー';
      btn.classList.remove('copied');
    }, 2500);
  }).catch(() => {
    prompt('このURLをコピーしてください', url);
  });
}

function shareX() {
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
}

function shareLine() {
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(`https://line.me/R/msg/text/${encodeURIComponent(text)}`, '_blank');
}

function showQr() {
  const url = buildShareUrl();
  document.getElementById('qrModalOverlay').classList.add('show');
  document.getElementById('qrUrl').textContent = url;
  const canvas = document.getElementById('qrCanvas');
  canvas.innerHTML = '';
  new QRCode(canvas, {
    text: url,
    width: 200,
    height: 200,
    colorDark: '#111111',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

function hideQr() {
  document.getElementById('qrModalOverlay').classList.remove('show');
}
</script>
