  grid-template-columns: repeat(4, 1fr);
  gap: 7px;

.calc-key {
  min-height: 44px; /* タッチターゲット確保 */

  background: #fff;
  font-family: 'BIZ UDPGothic', sans-serif;

  font-weight: 700;
  color: var(--color-text);
  cursor: pointer;
  transition: background 0.12s;

.calc-key:active { background: var(--color-primary-bg); }

.calc-key.key-op    { background:#fff7ed; border-color:#fed7aa; color:#c2410c; }

.calc-key.key-equals{ background: var(--color-primary); border-color: var(--color-primary); color:#fff; font-size:18px; }
.calc-key.key-clear { background:#fff1f1; border-color:#fca5a5; color:#b91c1c; }

// 角度モードの表示ラベル（DEG/RADの文言はここだけ触ればOK）
const ANGLE_MODE_LABELS = { A: '📐 DEG（度）', B: '📐 RAD（ラジアン）' };

// 結果の表示ラベル（サブ結果は無いのでmainのみ）
const RESULT_LABELS = { main: '計算結果' };

/* =====================================================
   ★電卓ボタン定義
   - ここに行を追加するだけで新しいボタンを増やせる
   - type: 'digit'（数字）/ 'op'（演算子・定数）/ 'func'（関数）/
           'sign'（±）/ 'del'（1文字削除）/ 'clear'（全消去）/ 'equals'（=）
   - value: 押した時に計算式へ追加される文字列（digit/op/funcのみ使用）
   ===================================================== */
const BUTTON_ROWS = [
  [
    { label: 'sin', type: 'func', value: 'sin(' },
    { label: 'cos', type: 'func', value: 'cos(' },
    { label: 'tan', type: 'func', value: 'tan(' },
    { label: '√',   type: 'func', value: 'sqrt(' },
  ],
  [
    { label: 'x²',  type: 'op', value: '^2' },
    { label: 'x^y', type: 'op', value: '^' },
    { label: 'ln',  type: 'func', value: 'ln(' },
    { label: 'log', type: 'func', value: 'log(' },
  ],
  [
    { label: 'π', type: 'op', value: 'π' },
    { label: 'e', type: 'op', value: 'e' },
    { label: '(', type: 'op', value: '(' },
    { label: ')', type: 'op', value: ')' },
  ],
  [
    { label: '%', type: 'op', value: '%' },
    { label: '±', type: 'sign' },
    { label: '⌫', type: 'del' },
    { label: 'C', type: 'clear' },
  ],
  [
    { label: '7', type: 'digit', value: '7' },
    { label: '8', type: 'digit', value: '8' },
    { label: '9', type: 'digit', value: '9' },
    { label: '÷', type: 'op',    value: '/' },
  ],
  [
    { label: '4', type: 'digit', value: '4' },
    { label: '5', type: 'digit', value: '5' },
    { label: '6', type: 'digit', value: '6' },
    { label: '×', type: 'op',    value: '*' },
  ],
  [
    { label: '1', type: 'digit', value: '1' },
    { label: '2', type: 'digit', value: '2' },
    { label: '3', type: 'digit', value: '3' },
    { label: '−', type: 'op',    value: '-' },
  ],
  [
    { label: '0', type: 'digit', value: '0' },
    { label: '.', type: 'digit', value: '.' },
    { label: '=', type: 'equals' },
    { label: '+', type: 'op',    value: '+' },
  ],
];

/* =====================================================
   状態管理
   ===================================================== */
let currentToggle = 'A'; // 角度モード：A=DEG, B=RAD
let expression = '';     // 現在の計算式
let historyList = [];    // 計算履歴：{ expr, result } の配列（新しい順＝先頭が最新）
const MAX_HISTORY = 50;  // 履歴の保持件数上限（増やしたい場合はここだけ変更）

/* =====================================================
   初期化
   ===================================================== */
document.addEventListener('DOMContentLoaded', () => {
  loadRecommends();
  renderButtons();
  restoreInputs();
  // テンキー・キーボードからの入力を受け付ける
  document.addEventListener('keydown', handleKeydown);
});

/* =====================================================
   おすすめツール読み込み（tools.jsonから）
   ===================================================== */
async function loadRecommends() {
  try {
    const res = await fetch('/tools.json');
    const tools = await res.json();
    const others = tools.filter(t => t.id !== CURRENT_TOOL_ID);
    const picks = others.sort(() => Math.random() - 0.5).slice(0, 2);
    const html = picks.length > 0
      ? picks.map(t => `<a class="recommend-link" href="${t.url}">${t.emoji} ${t.name}</a>`).join('')
      : '';
    document.getElementById('recommendLinks').innerHTML = html;
    document.getElementById('recommendLinks2').innerHTML = html;
  } catch (e) {
    document.getElementById('recommendLinks').textContent = '';
    document.getElementById('recommendLinks2').textContent = '';
  }
}

/* =====================================================
   ボタングリッドをJSから描画
   ===================================================== */
function renderButtons() {
  const container = document.getElementById('calcButtons');
  container.innerHTML = '';
  BUTTON_ROWS.flat().forEach(btn => {
    const el = document.createElement('button');
    el.type = 'button';
    el.textContent = btn.label;
    const colorClass =
      btn.type === 'digit' ? 'key-digit' :
      btn.type === 'func'  ? 'key-func'  :
      btn.type === 'equals'? 'key-equals':
      (btn.type === 'clear' || btn.type === 'del') ? 'key-clear' :
      'key-op';
    el.className = 'calc-key ' + colorClass;
    el.addEventListener('click', () => pressKey(btn));
    container.appendChild(el);
  });
}

/* =====================================================
   角度モード切り替え
   ===================================================== */
function setToggle(val) {
  currentToggle = val;
  document.getElementById('toggleA').classList.toggle('active', val === 'A');
  document.getElementById('toggleB').classList.toggle('active', val === 'B');
  onInputChange();
}

/* =====================================================
   ボタン押下処理
   - 実際の処理はappendToExpr等の共通ヘルパーに委譲
   - キーボード入力（handleKeydown）とロジックを共有するため
   ===================================================== */
function pressKey(btn) {
  switch (btn.type) {
    case 'clear':
      clearExpr();
      break;
    case 'del':
      deleteLast();
      break;
    case 'sign':
      toggleSign();
      updateDisplay();
      onInputChange();
      break;
    case 'equals':
      finalizeEquals();
      break;
    default:
      appendToExpr(btn.value);
      break;
  }
}

/* =====================================================
   式操作の共通ヘルパー
   - ボタン（pressKey）とキーボード（handleKeydown）の両方から呼ばれる
   ===================================================== */
function appendToExpr(value) {
  expression += value;
  updateDisplay();
  onInputChange();
}

function deleteLast() {
  expression = expression.slice(0, -1);
  updateDisplay();
  onInputChange();
}

function clearExpr() {
  expression = '';
  updateDisplay();
  onInputChange();
}

/* ±：式全体の符号を反転（再度押すと元に戻る） */
function toggleSign() {
  if (!expression) return;
  if (expression.startsWith('-(') && expression.endsWith(')')) {
    expression = expression.slice(2, -1);
  } else {
    expression = '-(' + expression + ')';
  }
}

/* =====================================================
   キーボード（PCのテンキー含む）からの入力
   - KeyboardEvent.key はテンキー/上段どちらの数字キーでも
     同じ値（'0'〜'9'）になるため、追加の分岐は不要
   - ★新しいキーに対応させたい場合はここにif文を追加するだけでOK
   ===================================================== */
function handleKeydown(e) {
  const key = e.key;

  if (/^[0-9]$/.test(key)) { appendToExpr(key); e.preventDefault(); return; }
  if (key === '.') { appendToExpr('.'); e.preventDefault(); return; }
  if (['+', '-', '*', '/'].includes(key)) { appendToExpr(key); e.preventDefault(); return; }
  if (key === '(' || key === ')') { appendToExpr(key); e.preventDefault(); return; }
  if (key === '^') { appendToExpr('^'); e.preventDefault(); return; }
  if (key === '%') { appendToExpr('%'); e.preventDefault(); return; }
  if (key === 'Enter' || key === '=') { finalizeEquals(); e.preventDefault(); return; }
  if (key === 'Backspace') { deleteLast(); e.preventDefault(); return; }
  if (key === 'Escape') { clearExpr(); e.preventDefault(); return; }
}

/* =：計算を確定し、履歴に記録した上で、結果を新しい計算式として続行できるようにする */
function finalizeEquals() {
  const result = calculateResult(calculateInputs());
  if (result === null) return;

  const formattedResult = formatDisplayNumber(result.main);

  // 履歴に追加（新しいものを先頭に。件数上限を超えたら古いものから削除）
  historyList.unshift({ expr: expression, result: formattedResult });
  if (historyList.length > MAX_HISTORY) historyList.pop();
  renderHistory();

  expression = formatNumber(result.main);
  updateDisplay();
  saveInputs();
  displayResult(result);
}

/* =====================================================
   計算履歴の描画
   ===================================================== */
function renderHistory() {
  const container = document.getElementById('historyList');
  container.innerHTML = '';

  if (historyList.length === 0) {
    container.innerHTML = '<div class="history-empty">まだ計算履歴はありません</div>';
    return;
  }

  historyList.forEach((item, idx) => {
    const el = document.createElement('button');
    el.type = 'button';
    el.className = 'history-item';
    el.innerHTML =
      `<span class="history-expr">${escapeHtml(item.expr)}</span>` +
      `<span class="history-eq">=</span>` +
      `<span class="history-result">${escapeHtml(item.result)}</span>`;
    el.addEventListener('click', () => recallHistory(idx));
    container.appendChild(el);
  });
}

/* 履歴項目をタップ：その計算式をそのまま呼び出し、続きを編集・計算できるようにする */
function recallHistory(idx) {
  const item = historyList[idx];
  if (!item) return;
  expression = item.expr;
  updateDisplay();
  onInputChange();
}

/* 履歴をすべて消す */
function clearHistory() {
  historyList = [];
  renderHistory();
  saveInputs();
}

/* HTML特殊文字のエスケープ（履歴表示時の安全対策） */
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

/* ディスプレイ更新 */
function updateDisplay() {
  const el = document.getElementById('exprDisplay');
  el.textContent = expression || '0';
  el.classList.toggle('is-empty', !expression);
}

/* =====================================================
   入力変更時のハンドラ（保存→計算を一括で呼ぶ）
   ===================================================== */
function onInputChange() {
  saveInputs();
  calculate();
}

/* =====================================================
   【入力取得】
   ===================================================== */
function calculateInputs() {
  return { expression, angleMode: currentToggle };
}

/* =====================================================
   【計算】
   ===================================================== */
function calculateResult(inputs) {
  if (!inputs.expression) return null;
  try {
    const val = evaluateExpression(inputs.expression, inputs.angleMode);
    if (typeof val !== 'number' || !isFinite(val)) return null;
    return { main: val };
  } catch (e) {
    return null; // 式が未完成（括弧が閉じてない等）は静かに無視
  }
}

/* =====================================================
   式の評価（ボタンからしか文字を追加できないため安全）
   - 念のため許可文字の最終チェックも入れておく
   ===================================================== */
function evaluateExpression(expr, angleMode) {
  let e = expr;
  e = e.replace(/π/g, 'Math.PI');
  e = e.replace(/(?<![a-zA-Z])e(?![a-zA-Z(])/g, 'Math.E');
  e = e.replace(/\^/g, '**');
  e = e.replace(/%/g, '/100');
  e = e.replace(/sin\(/g, '_sin(');
  e = e.replace(/cos\(/g, '_cos(');
  e = e.replace(/tan\(/g, '_tan(');
  e = e.replace(/sqrt\(/g, '_sqrt(');
  e = e.replace(/ln\(/g, '_ln(');
  e = e.replace(/log\(/g, '_log(');

  const safe = /^[0-9+\-*/().\s_a-zA-Z]*$/;
  if (!safe.test(e)) throw new Error('invalid expression');

  const DEG2RAD = Math.PI / 180;
  const _sin = x => Math.sin(angleMode === 'A' ? x * DEG2RAD : x);
  const _cos = x => Math.cos(angleMode === 'A' ? x * DEG2RAD : x);
  const _tan = x => Math.tan(angleMode === 'A' ? x * DEG2RAD : x);
  const _sqrt = x => Math.sqrt(x);
  const _ln = x => Math.log(x);
  const _log = x => Math.log10(x);

  const fn = new Function('_sin', '_cos', '_tan', '_sqrt', '_ln', '_log', 'Math',
    `"use strict"; return (${e});`);
  return fn(_sin, _cos, _tan, _sqrt, _ln, _log, Math);
}

/* 浮動小数点誤差対策：小数点以下10桁で丸める */
function formatNumber(num) {
  return String(Math.round(num * 1e10) / 1e10);
}

/* 表示用：整数部分に3桁区切りカンマを付ける */
function formatDisplayNumber(num) {
  const rounded = Math.round(num * 1e10) / 1e10;
  const [intPart, decPart] = String(rounded).split('.');
  const withComma = Number(intPart).toLocaleString();
  return decPart ? `${withComma}.${decPart}` : withComma;
}

/* =====================================================
   【表示】
   ===================================================== */
function displayResult(result) {
  const numEl = document.getElementById('resultNum');
  numEl.textContent = formatDisplayNumber(result.main);
  numEl.classList.remove('placeholder');

  ['btnCopyText', 'btnPdf', 'btnQrInputs', 'btnCopyExcel'].forEach(id => {
    document.getElementById(id).disabled = false;
  });
}

/* =====================================================
   計算メイン処理
   ===================================================== */
function calculate() {
  const inputs = calculateInputs();
  const result = calculateResult(inputs);

  if (result === null) {
    reset();
    return;
  }
  displayResult(result);
}

/* =====================================================
   リセット（プレースホルダー表示に戻す）
   ===================================================== */
function reset() {
  const numEl = document.getElementById('resultNum');
  numEl.textContent = '—';
  numEl.classList.add('placeholder');

  ['btnCopyText', 'btnPdf', 'btnQrInputs', 'btnCopyExcel'].forEach(id => {
    document.getElementById(id).disabled = true;
  });
}

/* =====================================================
   入力条件（計算式＋角度モード）をラベル付き配列で取得
   ===================================================== */
function buildConditionsLines() {
  return [
    `計算式：${expression || '(空欄)'}`,
    `角度モード：${ANGLE_MODE_LABELS[currentToggle]}`,
  ];
}

/* =====================================================
   クリップボードコピー共通処理
   ===================================================== */
function copyToClipboard(text, btnId, label) {
  const btn = document.getElementById(btnId);
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = label;
      btn.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

/* テキストでコピー */
function copyResultText() {
  const result = calculateResult(calculateInputs());
  if (!result) return;
  const lines = [
    '【入力条件】',
    ...buildConditionsLines(),
    '',
    '【計算結果】',
    `${RESULT_LABELS.main}：${formatDisplayNumber(result.main)}`,
  ];
  copyToClipboard(lines.join('\n'), 'btnCopyText', '📄 テキストでコピー');
}

/* PDF作成 */
function createPDF() {
  const result = calculateResult(calculateInputs());
  if (!result) return;

  const conditionsRows = buildConditionsLines()
    .map(line => {
      const [label, ...rest] = line.split('：');
      return `<tr><th>${label}</th><td>${rest.join('：')}</td></tr>`;
    })
    .join('');

  const resultRows = Object.keys(RESULT_LABELS)
    .filter(key => key in result)
    .map(key => `<tr><th>${RESULT_LABELS[key]}</th><td>${formatDisplayNumber(result[key])}</td></tr>`)
    .join('');

  const now = new Date().toLocaleString('ja-JP');

  document.getElementById('printArea').innerHTML = `
    <h2>関数電卓 計算結果</h2>
    <table>${conditionsRows}</table>
    <table>${resultRows}</table>
    <div class="print-date">出力日時：${now}</div>
  `;

  window.print();
}

/* =====================================================
   QRで計算結果を送る
   - URLは使わず、「計算式 = 答え」のテキストのみをQR化する
   ===================================================== */
function showQrInputs() {
  const result = calculateResult(calculateInputs());
  if (!result) return;
  const text = `${expression} = ${formatDisplayNumber(result.main)}`;
  showQr(text, '📷 計算結果のQRコード');
}

/* =====================================================
   Excel用コピー（入力条件＋結果＋計算履歴、タブ区切り）
   - 履歴があれば末尾に「計算履歴」ブロックとして追加
   - Excelに貼り付けるとラベル列／値列に自動で分かれる
   ===================================================== */
function copyResultExcel() {
  const result = calculateResult(calculateInputs());
  if (!result) return;

  const rows = [
    ...buildConditionsLines().map(line => line.split('：').join('\t')),
    ...Object.keys(RESULT_LABELS)
      .filter(key => key in result)
      .map(key => `${RESULT_LABELS[key]}\t${formatDisplayNumber(result[key])}`),
  ];

  // 計算履歴も一緒にコピー（式\t答え の形でExcelの2列に分かれる）
  if (historyList.length > 0) {
    rows.push(''); // 区切りの空行
    rows.push('計算履歴');
    historyList.forEach(item => rows.push(`${item.expr}\t${item.result}`));
  }

  copyToClipboard(rows.join('\n'), 'btnCopyExcel', '📊 Excel用コピー');
}

/* =====================================================
   LocalStorage：状態を保存
   ===================================================== */
function saveInputs() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      expression,
      angleMode: currentToggle,
      history: historyList,
    }));
  } catch (e) {
    // プライベートモード等でlocalStorageが使えない場合は無視
  }
}

/* =====================================================
   状態の復元（localStorageから：計算式・角度モード・履歴）
   ===================================================== */
function restoreInputs() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) { renderHistory(); return; }

    const data = JSON.parse(raw);
    expression = data.expression || '';
    currentToggle = data.angleMode === 'B' ? 'B' : 'A';
    historyList = Array.isArray(data.history) ? data.history : [];

    setToggle(currentToggle);
    updateDisplay();
    calculate();
    renderHistory();
  } catch (e) {
    // パース失敗時は無視
    renderHistory();
  }
}

/* =====================================================
   全リセット
   ===================================================== */
function resetAll() {
  expression = '';
  historyList = [];
  updateDisplay();
  renderHistory();
  setToggle('A');
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  reset();
}

/* =====================================================
   【シェア用URL】ツール紹介用（入力値は含めない）
   ===================================================== */
function buildShareUrl() {
  return location.href.split('?')[0];
}

/* =====================================================
   【シェア用テキスト】
   ===================================================== */
function buildShareText() {
  return `【関数電卓】\nsin・cos・tan・√・logなどが使える無料の関数電卓です！`;
}

/* URLコピー */
function shareUrl() {
  const url = buildShareUrl();
  const btn = document.getElementById('btnShareUrl');
  navigator.clipboard.writeText(url).then(() => {
    btn.textContent = '✅ コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '🔗 URLをコピー';
      btn.classList.remove('copied');
    }, 2500);
  }).catch(() => {
    prompt('このURLをコピーしてください', url);
  });
}

/* 𝕏（Twitter）シェア */
function shareX() {
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
}

/* LINEシェア */
function shareLine() {
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(`https://line.me/R/msg/text/${encodeURIComponent(text)}`, '_blank');
}

/* QRコード表示 */
function showQr(customUrl, customTitle) {
  const url = customUrl || buildShareUrl();
  document.getElementById('qrModalTitle').textContent = customTitle || '📷 QRコードでシェア';
  document.getElementById('qrModalOverlay').classList.add('show');
  document.getElementById('qrUrl').textContent = url;

  const canvas = document.getElementById('qrCanvas');
  canvas.innerHTML = '';
  new QRCode(canvas, {
    text: url,
    width: 200,
    height: 200,
    colorDark: '#111111',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
}

function hideQr() {
  document.getElementById('qrModalOverlay').classList.remove('show');
}

function closeQrOnOverlay(e) {
  if (e.target === document.getElementById('qrModalOverlay')) hideQr();
}
