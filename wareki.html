<script src="/common.js"></script>

<!-- =====================================================
     ★ここから下だけがツール固有部分
     ===================================================== -->
<script>
/* =====================================================
   設定（common.js側のloadRecommends／保存復元で使用）
   - 保存対象は西暦（inputSeireki）だけでOK
     → 復元時にそこから他3つ・十干十二支・年表を再計算する
   ===================================================== */
const CURRENT_TOOL_ID = 'wareki';
const STORAGE_KEY = 'wareki_inputs';
const STORAGE_FIELDS = ['inputSeireki'];

/* =====================================================
   元号定義（オフセット＋実在範囲）
   - オフセット：西暦 - offset = その元号の年数
   - start/end：実在した西暦範囲（範囲外は年表で薄字表示に使う）
   ===================================================== */
const ERAS = {
  showa:  { name:'昭和', offset:1925, start:1926, end:1989 },
  heisei: { name:'平成', offset:1988, start:1989, end:2019 },
  reiwa:  { name:'令和', offset:2018, start:2019, end:9999 },
};

const ETTO   = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const JIKKAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
function etto(y){ return ETTO[((y-4)%12+12)%12]; }
function jikkan(y){ return JIKKAN[((y-4)%10+10)%10]; }

/* =====================================================
   西暦を基準に「昭和・平成・令和・十干・十二支・年表」を
   まとめて同期する中心関数
   - .valueへのプログラム的な代入はinputイベントを発火しないので
     ループの心配なし
   ===================================================== */
function syncFromSeireki(seireki){
  document.getElementById('inputSeireki').value = seireki;
  document.getElementById('inputShowa').value  = seireki - ERAS.showa.offset;
  document.getElementById('inputHeisei').value = seireki - ERAS.heisei.offset;
  document.getElementById('inputReiwa').value  = seireki - ERAS.reiwa.offset;

  document.getElementById('jikkanVal').textContent = jikkan(seireki);
  document.getElementById('shishiVal').textContent = etto(seireki);

  renderYearTable(seireki);
  saveInputs(); // common.js：西暦だけlocalStorageに保存
}

/* =====================================================
   各入力欄のハンドラ
   - どれか1つ変更されたら、そこから西暦を逆算してsyncFromSeireki
   ===================================================== */
function onSeirekiInput(){
  const v = parseInt(document.getElementById('inputSeireki').value, 10);
  if(isNaN(v)) return;
  syncFromSeireki(v);
}
function onShowaInput(){
  const nen = parseInt(document.getElementById('inputShowa').value, 10);
  if(isNaN(nen)) return;
  syncFromSeireki(nen + ERAS.showa.offset);
}
function onHeiseiInput(){
  const nen = parseInt(document.getElementById('inputHeisei').value, 10);
  if(isNaN(nen)) return;
  syncFromSeireki(nen + ERAS.heisei.offset);
}
function onReiwaInput(){
  const nen = parseInt(document.getElementById('inputReiwa').value, 10);
  if(isNaN(nen)) return;
  syncFromSeireki(nen + ERAS.reiwa.offset);
}

/* =====================================================
   年表描画（基準年の過去5年〜未来20年、計26行）
   - 元号の実在範囲外は .era-invalid で薄字表示（-30等もそのまま表示）
   - 行タップでその年に一発ジャンプ
   ===================================================== */
function renderYearTable(baseY){
  const tbody = document.getElementById('yearTableBody');
  tbody.innerHTML = '';

  for (let y = baseY - 5; y <= baseY + 20; y++) {
    const tr = document.createElement('tr');
    if (y === baseY) tr.className = 'current-row';

    const showaNen  = y - ERAS.showa.offset;
    const heiseiNen = y - ERAS.heisei.offset;
    const reiwaNen  = y - ERAS.reiwa.offset;

    const showaCls  = (y >= ERAS.showa.start  && y <= ERAS.showa.end)  ? '' : ' class="era-invalid"';
    const heiseiCls = (y >= ERAS.heisei.start && y <= ERAS.heisei.end) ? '' : ' class="era-invalid"';
    const reiwaCls  = (y >= ERAS.reiwa.start) ? '' : ' class="era-invalid"';

    tr.innerHTML = `
      <td class="year-w">${y}</td>
      <td${showaCls}>${showaNen}</td>
      <td${heiseiCls}>${heiseiNen}</td>
      <td${reiwaCls}>${reiwaNen}</td>
      <td>${jikkan(y)}</td>
      <td>${etto(y)}</td>
    `;
    tr.addEventListener('click', () => syncFromSeireki(y));
    tbody.appendChild(tr);
  }

  const current = tbody.querySelector('.current-row');
  if (current) current.scrollIntoView({ behavior:'smooth', block:'center' });
}

/* =====================================================
   結果をテキストでコピー
   ===================================================== */
function copyResult(){
  const seireki = document.getElementById('inputSeireki').value;
  const showa   = document.getElementById('inputShowa').value;
  const heisei  = document.getElementById('inputHeisei').value;
  const reiwa   = document.getElementById('inputReiwa').value;
  const jk = document.getElementById('jikkanVal').textContent;
  const sh = document.getElementById('shishiVal').textContent;

  const text = [
    `西暦${seireki}年`,
    `昭和${showa}年`,
    `平成${heisei}年`,
    `令和${reiwa}年`,
    `十干：${jk}`,
    `十二支：${sh}`,
  ].join('\n');

  copyToClipboard(text, 'btnCopy', '📋 結果をコピー');
}

/* =====================================================
   common.jsのrestoreInputs()が呼ぶcalculate()をこのツール用に定義
   - localStorageに保存されていた西暦から全部再計算する
   ===================================================== */
function calculate(){
  const v = parseInt(document.getElementById('inputSeireki').value, 10);
  if (!isNaN(v)) syncFromSeireki(v);
}

/* =====================================================
   共有用URL／テキスト（common.jsのshareUrl／QRで使用）
   ===================================================== */
function buildShareUrl(){
  return location.href.split('?')[0];
}
function buildShareText(){
  return '和暦⇔西暦変換ツール\n西暦・昭和・平成・令和がどれからでも一発変換！';
}

/* =====================================================
   𝕏／LINEシェア（結果に依存せず常にシェア可能にするため
   common.js標準版を上書きしてシンプル化）
   ===================================================== */
function shareX(){
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
}
function shareLine(){
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(`https://line.me/R/msg/text/${encodeURIComponent(text)}`, '_blank');
}

/* =====================================================
   リセット
   - common.jsのresetAll()でlocalStorage削除＋入力欄クリア
   - そのあと今日の年を基準に再同期して分かりやすい初期状態に戻す
   ===================================================== */
function resetWareki(){
  resetAll();
  syncFromSeireki(new Date().getFullYear());
}

/* =====================================================
   初期表示
   - common.js側のDOMContentLoadedでrestoreInputs()が先に走る
   - 保存データが無くinputSeirekiが空のままなら、ここで今年を初期値にする
   ===================================================== */
document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('inputSeireki');
  if (!el.value) {
    syncFromSeireki(new Date().getFullYear());
  }
});
</script>
