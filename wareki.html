<style>
/* カード内タイトル（早見表カードの見出し） */
.card-title {

/* タブ切り替え（和暦→西暦／西暦→和暦） */

.tab-btn.active {

  box-shadow:0 1px 4px rgba(26,86,219,0.15);

/* 入力行（元号セレクト＋年入力を横並び） */
.input-section { margin-bottom:16px; }
.input-row { display:flex; gap:8px; align-items:flex-end; }
.wareki-input-group { display:flex; flex-direction:column; gap:5px; }
.wareki-input-group.era-select { flex:0 0 auto; min-width:90px; }

.input-label { font-size:11px; font-weight:700; color:var(--color-text-sub); letter-spacing:0.08em; }

.wareki-input-group select,
.wareki-input-group input[type="number"] {

.wareki-input-group select {

.wareki-input-group select:focus,

/* 変換ボタン（common.cssの.btn-calcを流用せず専用色を維持） */

.btn-convert:active { transform:scale(0.98); }

/* 変換結果パネル（独自レイアウトのためcommon.cssの.result-panel等を上書き） */

/* 早見表 */

@keyframes fadeUp {

  to   { opacity:1; transform:translateY(0); }
}

@media (max-width:380px) {

  .wareki-input-group.era-select { min-width:unset; width:100%; }
}

<script>
/* =====================================================
   設定（common.js側のloadRecommends／保存復元で使用）
   ===================================================== */
const CURRENT_TOOL_ID = 'wareki';
const STORAGE_KEY = 'wareki_inputs';
const STORAGE_FIELDS = ['eraSelect', 'warekiYear', 'seirekiYear'];

/* =====================================================
   元号定義（開始年・終了年（西暦）・オフセット）
   ===================================================== */
const ERAS = {
  reiwa:  { name:'令和', start:2019, end:9999, offset:2018 },  // 令和1年=2019年
  heisei: { name:'平成', start:1989, end:2019, offset:1988 },  // 平成1年=1989年
  showa:  { name:'昭和', start:1926, end:1989, offset:1925 },  // 昭和1年=1926年
};
// 同年切り替え備考
// 平成1年=1989年1月8日〜、昭和64年=1989年1月7日まで
// 令和1年=2019年5月1日〜、平成31年=2019年4月30日まで
// UIでは年単位で処理し、重複年は両方表示

const ETTO = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
function etto(y){ return ETTO[(y-4)%12<0?(y-4)%12+12:(y-4)%12]; }

/* =====================================================
   タブ切り替え
   ===================================================== */
let currentTab = 'wareki';
function switchTab(tab){
  currentTab = tab;
  document.getElementById('tabWareki').classList.toggle('active', tab==='wareki');
  document.getElementById('tabSeireki').classList.toggle('active', tab==='seireki');
  document.getElementById('paneWareki').style.display  = tab==='wareki'  ? '' : 'none';
  document.getElementById('paneSeireki').style.display = tab==='seireki' ? '' : 'none';
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('errWareki').classList.remove('show');
  document.getElementById('errSeireki').classList.remove('show');
}

function onEraChange(){
  const era = document.getElementById('eraSelect').value;
  const inp = document.getElementById('warekiYear');
  inp.value = '';
  if(era==='reiwa')  inp.max = new Date().getFullYear()-2018+5;
  if(era==='heisei') inp.max = 31;
  if(era==='showa')  inp.max = 64;
  saveInputs(); // common.js：現在の入力値をlocalStorageに保存
}

/* =====================================================
   和暦 → 西暦
   ===================================================== */
function convertWareki(){
  const errEl = document.getElementById('errWareki');
  errEl.classList.remove('show');
  const eraKey = document.getElementById('eraSelect').value;
  const era = ERAS[eraKey];
  const nen = parseInt(document.getElementById('warekiYear').value, 10);

  if(!nen || nen < 1){
    errEl.textContent='年を入力してください（1以上）'; errEl.classList.add('show'); return;
  }
  const maxNen = era.end - era.start + 1;
  if(nen > maxNen){
    errEl.textContent=`${era.name}は${maxNen}年までです`; errEl.classList.add('show'); return;
  }

  const seireki = era.offset + nen;
  const nenStr = nen===1 ? '元' : String(nen);

  showResult(
    `${seireki}年`,
    `${era.name}${nenStr}年`,
    [
      { label:'西暦', value:`${seireki}年` },
      { label:'干支', value:etto(seireki) },
      { label:'和暦（正式）', value:`${era.name}${nenStr}年` },
    ],
    `${era.name}${nenStr}年 → ${seireki}年 (${etto(seireki)})`
  );
}

/* =====================================================
   西暦 → 和暦
   ===================================================== */
function convertSeireki(){
  const errEl = document.getElementById('errSeireki');
  errEl.classList.remove('show');
  const y = parseInt(document.getElementById('seirekiYear').value, 10);

  if(!y){
    errEl.textContent='西暦を入力してください'; errEl.classList.add('show'); return;
  }
  if(y < 1926){
    errEl.textContent='対応範囲は昭和元年（1926年）以降です'; errEl.classList.add('show'); return;
  }
  if(y > 2100){
    errEl.textContent='2100年以降は対応していません'; errEl.classList.add('show'); return;
  }

  const matches = [];
  for(const [key, era] of Object.entries(ERAS)){
    if(y >= era.start && y <= era.end){
      const nen = y - era.offset;
      const nenStr = nen===1 ? '元' : String(nen);
      matches.push({ label:era.name, value:`${era.name}${nenStr}年（${y}年）`, nen, nenStr, era });
    }
  }
  const primary = matches[0];
  const items = matches.map(m=>({
    label:m.era.name, value:`${m.era.name}${m.nenStr}年`
  }));
  items.push({ label:'干支', value:etto(y) });

  showResult(
    `${primary.era.name}${primary.nenStr}年`,
    `西暦${y}年`,
    items,
    matches.map(m=>`${m.era.name}${m.nenStr}年`).join(' / ') + `（${y}年・${etto(y)}）`
  );
}

/* =====================================================
   結果表示
   ===================================================== */
let lastCopyText = '';
function showResult(main, sub, items, copyText){
  lastCopyText = copyText;
  document.getElementById('resultValue').textContent = main;
  document.getElementById('resultSub').textContent   = sub;

  const list = document.getElementById('resultList');
  list.innerHTML = '';
  items.forEach(item=>{
    const div = document.createElement('div');
    div.className = 'result-item';
    div.innerHTML = `<span class="result-item-label">${item.label}</span><span class="result-item-value">${item.value}</span>`;
    list.appendChild(div);
  });

  document.getElementById('resultPanel').classList.add('show');
  document.getElementById('resultPanel').scrollIntoView({behavior:'smooth', block:'nearest'});
}

function copyResult(){
  if(!lastCopyText) return;
  // common.jsのcopyToClipboardを流用（ボタンフィードバック付き）
  copyToClipboard(lastCopyText, 'btnCopy', '📋 結果をコピー');
}

/* =====================================================
   早見表
   ===================================================== */
let currentEraTable = 'reiwa';
function showTable(eraKey){
  currentEraTable = eraKey;
  document.querySelectorAll('.era-tab-btn').forEach((btn,i)=>{
    const keys=['reiwa','heisei','showa'];
    btn.classList.toggle('active', keys[i]===eraKey);
  });
  renderTable(eraKey);
}

function renderTable(eraKey){
  const era = ERAS[eraKey];
  const rows = [];
  const startY = era.start;
  const endY = Math.min(era.end, eraKey==='reiwa'? new Date().getFullYear()+2 : era.end);

  for(let y=startY; y<=endY; y++){
    const nen = y - era.offset;
    const nenStr = nen===1 ? '元' : String(nen);
    rows.push({ wareki:`${era.name}${nenStr}年`, seireki:y, etto:etto(y) });
  }
  const tbody = document.getElementById('eraTableBody');
  tbody.innerHTML = '';
  for(let i=0; i<rows.length; i+=2){
    const tr = document.createElement('tr');
    const r1 = rows[i];
    const r2 = rows[i+1];
    tr.innerHTML = `
      <td class="year-j">${r1.wareki}</td>
      <td class="year-w">${r1.seireki}</td>
      <td>${r1.etto}</td>
      ${r2 ? `<td class="year-j">${r2.wareki}</td><td class="year-w">${r2.seireki}</td><td>${r2.etto}</td>` : '<td></td><td></td><td></td>'}
    `;
    tr.addEventListener('click', ()=>fillFromTable(r1.seireki));
    tbody.appendChild(tr);
  }
}

function fillFromTable(seireki){
  document.getElementById('seirekiYear').value = seireki;
  switchTab('seireki');
  convertSeireki();
  saveInputs();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* =====================================================
   Enterキー対応
   ===================================================== */
document.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    if(currentTab==='wareki') convertWareki();
    else convertSeireki();
  }
});

/* =====================================================
   common.jsのrestoreInputs()が呼ぶcalculate()をこのツール用に定義
   - 保存されていた値をタブに応じて自動変換する
   - 空欄のときはエラーを出さず静かに何もしない
   ===================================================== */
function calculate(){
  if(currentTab === 'wareki'){
    const nen = document.getElementById('warekiYear').value;
    if(nen === '') return;
    convertWareki();
  } else {
    const y = document.getElementById('seirekiYear').value;
    if(y === '') return;
    convertSeireki();
  }
}

/* =====================================================
   共有用URL／テキスト（common.jsのshareUrl／QRで使用）
   ===================================================== */
function buildShareUrl(){
  return location.href.split('?')[0];
}
function buildShareText(){
  return '和暦⇔西暦変換ツール\n令和・平成・昭和と西暦を瞬時に変換できます！';
}

/* =====================================================
   𝕏／LINEシェア（このツールは計算結果に依存せず常にシェア可能なため
   common.js標準版（結果必須）を上書きしてシンプル化）
   ===================================================== */
function shareX(){
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
}
function shareLine(){
  const text = buildShareText() + '\n' + buildShareUrl();
  window.open(`https://line.me/R/msg/text/${encodeURIComponent(text)}`, '_blank');
}

/* =====================================================
   リセット（common.jsのresetAll＋このツール専用の後処理）
   - 入力欄クリア＋localStorage削除はresetAll()に任せる
   - 結果パネル非表示・タブを初期状態に戻すのはこのツール側で追加
   ===================================================== */
function resetWareki(){
  resetAll(); // common.js：STORAGE_FIELDSクリア＋localStorage削除
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('errWareki').classList.remove('show');
  document.getElementById('errSeireki').classList.remove('show');
  switchTab('wareki');
}

/* =====================================================
   初期化（早見表の初期表示）
   - おすすめ読込／入力値復元はcommon.js側のDOMContentLoadedで実行される
   ===================================================== */
renderTable('reiwa');
</script>
</body>
