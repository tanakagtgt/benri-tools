<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブラウザ完結型 音楽ファイル分割ツール</title>
  <link rel="stylesheet" href="mfile-cutter.css">
  <!-- WaveSurfer.js (波形表示用ライブラリ) -->
  <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
  <!-- JSZip (ZIPアーカイブ作成用ライブラリ) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

  <!-- メインコンテナ -->
  <div class="container">
    <header class="main-header">
      <h1>音楽ファイル分割ツール</h1>
      <p class="subtitle">ファイルをサーバーに送信しないため、安全・高速に処理できます。</p>
    </header>

    <!-- ドラッグ＆ドロップ / ファイル選択エリア -->
    <section class="upload-section" id="drop-zone">
      <div class="upload-box">
        <svg class="upload-icon" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
        <p>ここに音楽ファイルをドラッグ＆ドロップ</p>
        <span>または</span>
        <label for="file-input" class="btn btn-primary">ファイルを選択</label>
        <input type="file" id="file-input" accept=".mp3,.wav,.m4a,.aac,.ogg" multiple style="display: none;">
      </div>
    </section>

    <!-- 複数ファイル管理タブリスト -->
    <section class="file-tabs-section" id="file-tabs-container" style="display: none;">
      <div class="file-tabs" id="file-tabs"></div>
    </section>

    <!-- ファイル詳細情報表示 -->
    <section class="info-section" id="info-section" style="display: none;">
      <div class="info-grid">
        <div class="info-item"><strong>ファイル名:</strong> <span id="info-name">-</span></div>
        <div class="info-item"><strong>再生時間:</strong> <span id="info-duration">-</span></div>
        <div class="info-item"><strong>容量:</strong> <span id="info-size">-</span></div>
        <div class="info-item"><strong>ビットレート:</strong> <span id="info-bitrate">-</span></div>
        <div class="info-item"><strong>サンプリングレート:</strong> <span id="info-samplerate">-</span></div>
      </div>
    </section>

    <!-- プレイヤーコントローラー -->
    <section class="player-section" id="player-section" style="display: none;">
      <div class="controls-row main-controls">
        <button id="btn-backward" class="btn btn-secondary">10秒戻る</button>
        <button id="btn-play-pause" class="btn btn-primary btn-large">再生</button>
        <button id="btn-stop" class="btn btn-secondary">停止</button>
        <button id="btn-forward" class="btn btn-secondary">10秒進む</button>
      </div>

      <div class="controls-row sub-controls">
        <!-- 再生速度 -->
        <div class="control-group">
          <label for="rate-select">再生速度:</label>
          <select id="rate-select" class="form-control">
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1.0" selected>1.0x (標準)</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2.0">2.0x</option>
          </select>
        </div>

        <!-- 音量 -->
        <div class="control-group">
          <label for="volume-slider">音量:</label>
          <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
        </div>

        <!-- ループ設定 -->
        <div class="control-group checkbox-group">
          <input type="checkbox" id="chk-loop">
          <label for="chk-loop">ループ再生</label>
        </div>

        <!-- 履歴操作 -->
        <div class="control-group history-controls">
          <button id="btn-undo" class="btn btn-small" title="元に戻す (Ctrl+Z)">Undo</button>
          <button id="btn-redo" class="btn btn-small" title="やり直す (Ctrl+Y)">Redo</button>
        </div>
      </div>
    </section>

    <!-- 波形表示エリア -->
    <section class="waveform-section" id="waveform-section" style="display: none;">
      <div id="waveform"></div>
      <div class="waveform-hints">
        <span>※波形上をクリックまたはドラッグして再生位置を変更できます。</span>
      </div>
    </section>

    <!-- 分割アクション & 手動追加 -->
    <section class="split-action-section" id="split-action-section" style="display: none;">
      <div class="action-row">
        <button id="btn-add-split" class="btn btn-accent btn-large">現在位置に分割点を追加</button>
        <button id="btn-clear-splits" class="btn btn-danger">すべての分割点を削除</button>
      </div>
      
      <!-- 手動時間入力フォーム -->
      <div class="manual-input-box">
        <label for="manual-time-input">時間を直接指定して追加:</label>
        <input type="text" id="manual-time-input" class="form-control" placeholder="例: 01:20 または 00:35.250">
        <button id="btn-manual-add" class="btn btn-secondary">追加</button>
      </div>
    </section>

    <!-- 分割点一覧 & エクスポート -->
    <section class="splits-list-section" id="splits-list-section" style="display: none;">
      <h2>分割点一覧</h2>
      <div class="table-container">
        <table class="splits-table">
          <thead>
            <tr>
              <th>No</th>
              <th>位置 (時間)</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="splits-tbody">
            <!-- JavaScriptで動的に生成 -->
          </tbody>
        </table>
      </div>

      <!-- 保存エリア -->
      <div class="export-box">
        <h3>エクスポート</h3>
        <p>※ブラウザの機能を用いて音声データを切り出します（再エンコードによる劣化なしのWAV切り出し、またはWeb Audioを用いた簡易出力となります）。</p>
        <div class="export-buttons">
          <button id="btn-export-individual" class="btn btn-secondary">個別に保存 (連続ダウンロード)</button>
          <button id="btn-export-zip" class="btn btn-primary btn-large">すべての分割ファイルを取り出してZIP保存</button>
        </div>
      </div>
    </section>
  </div>

  <!-- スマートフォン用ボトム固定ナビゲーション -->
  <nav class="mobile-sticky-nav" id="mobile-nav">
    <button id="mob-btn-backward" class="mob-nav-btn">
      <span class="icon">⏮</span>
      <span class="label">10秒戻る</span>
    </button>
    <button id="mob-btn-play" class="mob-nav-btn mob-nav-btn-main">
      <span class="icon">▶</span>
      <span class="label">再生</span>
    </button>
    <button id="mob-btn-forward" class="mob-nav-btn">
      <span class="icon">⏭</span>
      <span class="label">10秒進む</span>
    </button>
    <button id="mob-btn-split" class="mob-nav-btn mob-nav-btn-accent">
      <span class="icon">✂</span>
      <span class="label">分割</span>
    </button>
    <button id="mob-btn-save" class="mob-nav-btn mob-nav-btn-save">
      <span class="icon">💾</span>
      <span class="label">保存</span>
    </button>
  </nav>

  <!-- アプリケーションロジック -->
  <script src="mfile-cutter.js"></script>
</body>
</html>
